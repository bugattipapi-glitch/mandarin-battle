const NODES = [
  { x: 130, y: 430 }, { x: 320, y: 350 }, { x: 470, y: 440 }, { x: 660, y: 330 }, { x: 800, y: 180 }
];
let owBG = null;

function buildOwBG() {
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#070514'); grad.addColorStop(1, '#150c2e');
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  // city blocks
  for (let i = 0; i < 240; i++) {
    const bx = rnd(0, W), by = rnd(90, H - 20), bw = rnd(10, 46), bh = rnd(8, 30);
    g.fillStyle = 'rgba(40,30,90,' + rnd(0.25, 0.6) + ')';
    g.fillRect(bx, by, bw, bh);
    if (Math.random() < 0.4) { g.fillStyle = pick(['#ff4dd2', '#6ae4ff', '#ffd24a', '#7dff6a']); g.globalAlpha = rnd(0.25, 0.8); g.fillRect(bx + rnd(0, bw - 3), by + rnd(0, bh - 3), 2.5, 2.5); g.globalAlpha = 1; }
  }
  // river
  g.strokeStyle = 'rgba(60,140,220,0.4)'; g.lineWidth = 26;
  g.beginPath(); g.moveTo(-20, 300); g.bezierCurveTo(250, 240, 500, 520, 990, 420); g.stroke();
  // distant fuji
  g.fillStyle = 'rgba(120,110,200,0.5)';
  g.beginPath(); g.moveTo(700, 110); g.lineTo(860, 110); g.lineTo(960, 200); g.lineTo(620, 200); g.closePath(); g.fill();
  g.fillStyle = 'rgba(230,235,255,0.8)';
  g.beginPath(); g.moveTo(742, 110); g.lineTo(818, 110); g.lineTo(836, 128); g.lineTo(780, 122); g.lineTo(726, 128); g.closePath(); g.fill();
  owBG = c;
}

function drawOverworld(dt) {
  if (!owBG) buildOwBG();
  ctx.drawImage(owBG, 0, 0);
  ctx.fillStyle = '#9ffcf0'; ctx.font = '16px "Press Start 2P", monospace'; ctx.textAlign = 'center';
  ctx.fillText('NEO TOKYO : SECTOR 67', W / 2, 46);
  ctx.fillStyle = '#5b6a8f'; ctx.font = '16px "Press Start 2P", monospace';
  ctx.fillText('TAP A SECTOR TO DEPLOY', W / 2, 68);
  // path
  ctx.setLineDash([7, 9]);
  ctx.strokeStyle = 'rgba(159,252,240,0.5)'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(NODES[0].x, NODES[0].y);
  for (let i = 1; i < NODES.length; i++) ctx.lineTo(NODES[i].x, NODES[i].y);
  ctx.stroke();
  ctx.setLineDash([]);
  // nodes
  NODES.forEach((n, i) => {
    const open = i < unlocked, done = i < unlocked - 1;
    const pulse = open && !done ? 3 + Math.sin(performance.now() / 200) * 2 : 0;
    ctx.fillStyle = done ? '#2a8f5a' : open ? THEMES[i].neon[0] : '#252040';
    ctx.beginPath(); ctx.arc(n.x, n.y, 20 + pulse, 0, TAU); ctx.fill();
    ctx.strokeStyle = open ? '#fff' : '#3a3560'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(n.x, n.y, 20 + pulse, 0, TAU); ctx.stroke();
    ctx.fillStyle = open ? '#fff' : '#555078'; ctx.font = '16px "Press Start 2P", monospace';
    ctx.fillText(done ? '✓' : (i + 1), n.x, n.y + 5);
    ctx.font = '16px "Press Start 2P", monospace';
    ctx.fillStyle = open ? '#cfe3ff' : '#3f3a66';
    const nm = ['SHINJUKU', 'HARBOR', 'EXPWY', 'FOUNDRY', 'FUJI'][i];
    ctx.fillText(nm, n.x, n.y + (i % 2 ? 44 : 62));
  });
  // mini ship at / flying to node
  let sx, sy;
  if (ow.anim) {
    ow.anim.t += dt / ow.anim.dur;
    const a = NODES[ow.anim.from], b = NODES[ow.anim.to], tt = Math.min(1, ow.anim.t);
    const e2 = tt < 0.5 ? 2 * tt * tt : 1 - (-2 * tt + 2) ** 2 / 2;
    sx = a.x + (b.x - a.x) * e2; sy = a.y + (b.y - a.y) * e2 - Math.sin(tt * Math.PI) * 36;
    if (tt >= 1) { ow.ship = ow.anim.to; const dest = ow.anim.to; ow.anim = null; openLevelIntro(dest); }
  } else { sx = NODES[ow.ship].x; sy = NODES[ow.ship].y - 30 + Math.sin(performance.now() / 350) * 4; }
  drawShip(sx, sy, 10, 0, false, 0);
  // score strip
  ctx.textAlign = 'left'; ctx.font = '16px "Press Start 2P", monospace';
  ctx.fillStyle = '#ffd24a'; ctx.fillText('SCORE ' + score, 16, H - 18);
  ctx.fillStyle = '#9aa7c7'; ctx.fillText('BEST ' + best, 200, H - 18);
  if (mode === 'danger') { ctx.fillStyle = '#ff5d76'; ctx.fillText('☠ DANGER ZONE', W - 200, H - 18); }
}

function onTap(x, y) {
  if (state === 'boot') { sfx.click(); openIntro(); return; }   // audioInit already ran on pointerdown
  if (state === 'intro') { sfx.click(); openTitle(); return; }
  if (state !== 'overworld' || ow.anim) return;
  NODES.forEach((n, i) => {
    if (i < unlocked && (x - n.x) ** 2 + (y - n.y) ** 2 < 32 ** 2) {
      sfx.click();
      if (i === ow.ship) openLevelIntro(i);

}

/* ============================================================
   MAIN LOOP
   ============================================================ */
let last = 0;
function loop(ts) {
  const dt = Math.min(0.033, (ts - last) / 1000 || 0.016);
  last = ts;
  if (state === 'play' || state === 'boss') updatePlay(dt);
  if (state === 'prealert') {
    preT += dt;
    updatePlayer(dt); updateBullets(dt);
    for (let i = parts.length - 1; i >= 0; i--) { const p = parts[i]; p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; if (p.vr) p.r += p.vr * dt; if (p.life <= 0) parts.splice(i, 1); }
    if (preT > 2.0) openQuiz(true);
  }
  if (state === 'bossintro') {
    updatePlayer(dt); updateBullets(dt);
    if (boss) { boss.t += dt; if (boss.entering) { boss.x += (W - 150 - boss.x) * 1.4 * dt; } }
    if (Math.random() < dt * 10)
      parts.push({ kind: 'line', x: W + 20, y: rnd(10, H - 10), vx: -1600, vy: 0, life: 0.5, col: 'rgba(255,255,255,0.35)', len: rnd(70, 170), r: 0 });
    for (let i = parts.length - 1; i >= 0; i--) { const p = parts[i]; p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; if (p.vr) p.r += p.vr * dt; if (p.life <= 0) parts.splice(i, 1); }
    if (bossIntroT > 2.6) { boss.entering = false; setState('boss'); }
  }
  if (state === 'gameover' || state === 'clear' || state === 'victory') {
    for (let i = parts.length - 1; i >= 0; i--) { const p = parts[i]; p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; if (p.vr) p.r += p.vr * dt; if (p.life <= 0) parts.splice(i, 1); }
  }

  if (state === 'overworld') drawOverworld(dt);
  else if (state === 'boot') drawBoot(dt);
  else if (state === 'intro') drawIntro(dt);
  else if (state === 'title' || state === 'select') drawTitle(dt);
  else drawGame(dt);

  mctx.imageSmoothingEnabled = false;
  mctx.drawImage(osc, 0, 0, RW, RH, 0, 0, W, H);
  requestAnimationFrame(loop);
}

const music = { started: false, song: 'main', step: 0, nextT: 0, gain: null, dist: null, timer: null };
const noteF = s => 110 * Math.pow(2, s / 12);
let noiseBuf = null;

function musicStart() {
  if (!AC || music.started) return;
  try {
    music.started = true;
    music.gain = AC.createGain();
    music.gain.gain.value = VOLS[volMode];
    music.gain.connect(AC.destination);
    // distortion chain for "guitar" voices: waveshaper -> lowpass -> trim
    const ws = AC.createWaveShaper();
    const n = 1024, curve = new Float32Array(n);
    for (let i = 0; i < n; i++) { const x = i / (n - 1) * 2 - 1; curve[i] = Math.tanh(3.2 * x); }
    ws.curve = curve; ws.oversample = '2x';
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3600; lp.Q.value = 0.8;
    const trim = AC.createGain(); trim.gain.value = 0.42;
    ws.connect(lp); lp.connect(trim); trim.connect(music.gain);
    music.dist = ws;
    noiseBuf = AC.createBuffer(1, (AC.sampleRate * 0.3) | 0, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    music.nextT = AC.currentTime + 0.06;
    music.timer = setInterval(musicTick, 44);
  } catch (e) { }
}
function setSong(name) {
  if (music.song !== name) { music.song = name; music.step = 0; switchTrack(name); }
}
function vo(type, f, t, dur, vol, f2, dest) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f, t);
  if (f2) o.frequency.exponentialRampToValueAtTime(f2, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(dest || music.gain); o.start(t); o.stop(t + dur + 0.02);
}
function vNoise(t, dur, vol, freq, q) {
  const s = AC.createBufferSource(); s.buffer = noiseBuf;
  const f = AC.createBiquadFilter(); f.type = freq > 4000 ? 'highpass' : 'bandpass'; f.frequency.value = freq; if (q) f.Q.value = q;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  s.connect(f); f.connect(g); g.connect(music.gain); s.start(t); s.stop(t + dur + 0.02);
}
function musicTick() {
  if (!AC || !music.gain) return;
  try {
    const s = SONGS[music.song] || SONGS.main, spb = 60 / s.bpm / 4;
    while (music.nextT < AC.currentTime + 0.16) {
      const t = music.nextT, st = music.step, bar = (st / 16) | 0, bs = st % 16;
      const root = s.roots[bar];
      // drums
      if (s.kick.includes(bs)) vo('sine', 150, t, 0.12, 0.95, 40);
      if (s.snare.includes(bs)) { vNoise(t, 0.13, 0.5, 1900, 0.9); vo('triangle', 195, t, 0.08, 0.3); }
      vNoise(t, bs % 2 ? 0.025 : 0.05, bs % 4 === 2 ? 0.22 : 0.12, 7800);
      if (bs === 14 && bar === 3) vNoise(t, 0.3, 0.25, 5200);          // crash into the loop
      // bass: square + sub
      const bn = s.bass[st];
      if (bn !== NN) { vo('square', noteF(bn - 12), t, spb * 1.6, 0.24); vo('sine', noteF(bn - 24), t, spb * 1.8, 0.34); }
      // rhythm guitar: palm-muted power chords through distortion
      if (s.chug.includes(bs)) {
        const long = bs === 0;

          vo('sawtooth', noteF(root + iv - 12), t, long ? spb * 3.2 : spb * 0.85, long ? 0.16 : 0.13, 0, music.dist);
      }
      // lead guitar: detuned saws + octave shimmer, slight fall-off bend
      const ln = s.lead[st];
      if (ln !== NN) {
        const f = noteF(ln + 12);

        vo('square', f * 2.003, t, sustain * 0.6, 0.05);
      }
      // arp sparkle layer
      if (s.arp) {
        const tones = [root + 12, root + 12 + s.third, root + 19, root + 24];
        vo('square', noteF(tones[[0, 1, 2, 3, 2, 1][bs % 6]]), t, spb * 0.9, 0.045);
      }
      music.step = (music.step + 1) % 64;
      music.nextT += spb;
    }
  } catch (e) { }
}
