<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>NEO TOKYO: SECTOR 67</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #04030c; overflow: hidden; overscroll-behavior: none;
    font-family: 'Press Start 2P', ui-monospace, Menlo, monospace;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  #wrap { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  canvas { display: block; background: #04030c; touch-action: none; image-rendering: pixelated; }

  /* CRT scanlines */
  #crt { position: absolute; inset: 0; pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.13) 3px);
    mix-blend-mode: multiply; }

  #hud { position: absolute; top: 8px; left: 12px; right: 12px; z-index: 6;
    display: flex; justify-content: space-between; align-items: center; pointer-events: none;
    color: #9ffcf0; font-size: 10px; text-shadow: 0 0 8px rgba(106,228,255,.8); }
  .hbtns { display: flex; gap: 8px; }
  #pb, #mb { pointer-events: auto; background: rgba(10,8,30,.7); color: #9ffcf0;
    border: 1px solid #3a5e8f; font-family: inherit; font-size: 10px; padding: 7px 10px; cursor: pointer; }
  #pb { display: none; }

  #panel { position: absolute; inset: 0; z-index: 8; display: flex; align-items: center; justify-content: center;
    background: rgba(3,4,14,.8); padding: 12px; }
  #panel.hidden { display: none; }
  #panel.bottom { align-items: flex-end; background: transparent; padding-bottom: 3vh; pointer-events: none; }
  .titlebar { pointer-events: auto; text-align: center; width: 100%; max-width: 660px; }
  .trow { display: flex; gap: 12px; }
  .trow .btn { margin-top: 0; }
  .titlebar .hint { text-shadow: 0 1px 4px #000; margin-top: 12px; }

  /* pilot select */
  .box.select { max-width: 640px; }
  .pgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .pcard { font-family: inherit; cursor: pointer; background: #10103a; border: 3px solid var(--c);
    box-shadow: 0 0 14px color-mix(in srgb, var(--c) 40%, transparent), inset 0 0 20px rgba(0,0,0,.5);
    padding: 10px 6px; color: #e8ecff; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .pcard:active { transform: translateY(2px); }
  .pcard img, .pcard .pph { width: 100%; aspect-ratio: 1; image-rendering: pixelated; display: block;
    border: 2px solid #04030c; }
  .pname { font-size: 11px; color: var(--c); }
  .prole { font-size: 7px; color: #9aa7c7; line-height: 1.5; }
  @media (max-width: 560px) { .pgrid { grid-template-columns: repeat(2, 1fr); } }

  .box { background: #0a0a22; border: 2px solid #4a3a8f; box-shadow: 0 0 0 2px #04030c, 0 0 28px rgba(120,80,255,.45), inset 0 0 50px rgba(40,20,90,.35);
    padding: 22px 26px; max-width: 560px; width: 100%; text-align: center; color: #cfe3ff; }
  .box.small { max-width: 430px; }

  .eyebrow { font-size: 8px; letter-spacing: 2px; color: #6ae4ff; margin-bottom: 14px; }
  .eyebrow.alert { color: #ff4d6d; animation: blink 0.8s steps(2) infinite; }
  .eyebrow.ok { color: #7dff6a; }
  @keyframes blink { 50% { opacity: .25; } }

  .gtitle { font-size: 30px; color: #ff4dd2; line-height: 1.25; margin: 6px 0 14px;
    text-shadow: 3px 3px 0 #2a0a4a, 0 0 22px rgba(255,77,210,.8); }
  .gtitle span { display: block; font-size: 16px; color: #6ae4ff; letter-spacing: 6px; margin-top: 8px;
    text-shadow: 2px 2px 0 #0a2a3a, 0 0 16px rgba(106,228,255,.9); }
  .story { font-size: 9px; line-height: 2; color: #9aa7c7; margin-bottom: 18px; }
  .bigname { font-size: 16px; color: #fff; margin: 6px 0 14px; line-height: 1.5; text-shadow: 0 0 14px rgba(255,255,255,.5); }
  .stats { font-size: 9px; line-height: 2.2; color: #9aa7c7; margin-bottom: 16px; }

  .btn { font-family: inherit; cursor: pointer; display: block; width: 100%;
    background: #141038; color: #e8ecff; border: 2px solid #6ae4ff; font-size: 11px;
    padding: 14px 10px; margin-top: 10px; text-shadow: 0 0 8px rgba(106,228,255,.7); }
  .btn:active { transform: translateY(2px); }
  .btn.go { background: #1a3550; border-color: #7dff6a; color: #d6ffd0; }
  .btn.ghost { border-color: #3a3560; color: #8a86b8; }
  .btn.dz { background: #2a0d18; border-color: #ff4d6d; color: #ffb0c0; text-shadow: 0 0 8px rgba(255,77,109,.7); }

  .box.hot { border-color: #ff4d6d; animation: hotpulse .7s ease-in-out infinite; }
  @keyframes hotpulse {
    0%, 100% { box-shadow: 0 0 0 2px #04030c, 0 0 30px rgba(255,77,109,.55), inset 0 0 50px rgba(90,10,30,.4); }
    50% { box-shadow: 0 0 0 2px #04030c, 0 0 64px rgba(255,77,109,.95), inset 0 0 64px rgba(130,16,44,.55); }
  }
  .box.hot .hanzi { text-shadow: 0 0 30px rgba(255,77,109,.95), 0 0 64px rgba(255,170,60,.55); }

  /* quiz */
  .hanzi { font-family: 'Hiragino Sans', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    font-size: 96px; line-height: 1.15; color: #fff; margin: 4px 0 2px;
    text-shadow: 0 0 30px rgba(255,77,210,.9), 0 0 60px rgba(106,228,255,.5); }
  .quiz .hanzi { animation: pop .35s ease-out; }
  @keyframes pop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .prompt { font-size: 10px; color: #6ae4ff; margin: 6px 0 14px; }
  .ans { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ans-btn { margin-top: 0; min-height: 56px; font-size: 11px; line-height: 1.5; }
  .ans-btn.right { border-color: #7dff6a; background: #103a1a; color: #b8ffb0; }
  .ans-btn.wrong { border-color: #ff4d6d; background: #3a0d18; color: #ffb0c0; }
  .ans-btn:disabled { cursor: default; }
  .hint { font-size: 8px; color: #5b6a8f; margin-top: 14px; line-height: 1.9; }
  .hint.ok { color: #7dff6a; }
  .hint.no { color: #ff8da3; }

  /* upgrade cards */
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { font-family: inherit; cursor: pointer; background: #10103a; border: 2px solid var(--c);
    box-shadow: 0 0 16px color-mix(in srgb, var(--c) 35%, transparent), inset 0 0 26px rgba(0,0,0,.5);
    padding: 18px 10px; color: #e8ecff; display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .card:active { transform: translateY(2px); }
  .cicon { font-size: 26px; color: var(--c); text-shadow: 0 0 14px var(--c); }
  .cname { font-size: 10px; color: var(--c); line-height: 1.5; }
  .cname em { font-style: normal; color: #fff; background: rgba(255,255,255,.12); padding: 2px 5px; }
  .cdesc { font-size: 8px; color: #9aa7c7; line-height: 1.7; }

  @media (max-width: 560px) {
    .gtitle { font-size: 22px; }
    .hanzi { font-size: 72px; }
    .box { padding: 16px 14px; }
    .ans-btn { font-size: 9px; min-height: 50px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="crt"></div>
  <div id="hud"><span id="hudL"></span><span id="hudR"></span><span class="hbtns"><button id="mb">♪</button><button id="pb">‖ PAUSE</button></span></div>
  <div id="panel" class="hidden"></div>
</div>
<script>
'use strict';
/* ============================================================
   NEO TOKYO: SECTOR 67  -  retro horizontal shooter + Mandarin drills
   ============================================================ */
const W = 960, H = 540, TAU = Math.PI * 2;
const cv = document.getElementById('cv');
const mctx = cv.getContext('2d');
const RW = 480, RH = 270;                 // native arcade-ish resolution
const osc = document.createElement('canvas');
osc.width = RW; osc.height = RH;
const ctx = osc.getContext('2d');
ctx.setTransform(RW / W, 0, 0, RH / H, 0, 0);
const hudL = document.getElementById('hudL');
const hudR = document.getElementById('hudR');
const panel = document.getElementById('panel');
const pauseBtn = document.getElementById('pb');

const rnd = (a, b) => a + Math.random() * (b - a);
const ri = (a, b) => Math.floor(rnd(a, b + 1));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const pick = a => a[Math.floor(Math.random() * a.length)];
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
const hit = (a, b) => { const dx = a.x - b.x, dy = a.y - b.y, r = a.r + b.r; return dx * dx + dy * dy < r * r; };

/* ---------- safe storage (works on GitHub Pages, degrades gracefully elsewhere) ---------- */
const store = {
  get(k, d) { try { const v = localStorage.getItem(k); return v == null ? d : JSON.parse(v); } catch (e) { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { } }
};

/* ---------- audio: volume modes ---------- */
const VOLS = { high: 0.5, low: 0.2, mute: 0 };
const SFX_MUL = { high: 1, low: 0.45, mute: 0 };
let volMode = store.get('nt67_vol', 'high');

/* ---------- tiny synth sfx ---------- */
let AC = null;
function audioInit() { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { } } if (AC && AC.state === 'suspended') AC.resume(); initTracks(); }
function beep(f, d, type, v, slide) {
  if (!AC) return;
  try {
    const t = AC.currentTime, o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(f, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, f + slide), t + d);
    g.gain.setValueAtTime(Math.max(0.00002, (v || 0.07) * SFX_MUL[volMode]), t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + d);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t + d);
  } catch (e) { }
}
function vox(text, force) {
  if (volMode === 'mute') return;
  if (!force && voiceCount >= 5) return;
  voiceCount++;
  // radio squelch + static bed under the line
  if (AC && noiseBuf) {
    try {
      const t = AC.currentTime;
      vNoise(t, 0.07, 0.25, 5200);
      vNoise(t + 0.05, 0.6, 0.05, 2400, 1.4);
      beep(1320, 0.05, 'square', 0.05);
    } catch (e) { }
  }
  try {
    if (typeof speechSynthesis === 'undefined') return;
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.08; u.pitch = 0.5;
    u.volume = volMode === 'low' ? 0.4 : 0.9;
    speechSynthesis.speak(u);
  } catch (e) { }
}

const sfx = {
  shoot() { beep(820, 0.045, 'square', 0.02, -350); },
  ehit() { beep(220, 0.06, 'sawtooth', 0.04, -80); },
  boom() { beep(130, 0.32, 'sawtooth', 0.09, -90); },
  big() { beep(75, 0.8, 'sawtooth', 0.13, -45); },
  hurt() { beep(180, 0.25, 'square', 0.09, -120); },
  good() { beep(660, 0.1, 'square', 0.06); setTimeout(() => beep(880, 0.1, 'square', 0.06), 100); setTimeout(() => beep(1320, 0.2, 'square', 0.06), 200); },
  bad() { beep(280, 0.16, 'square', 0.07); setTimeout(() => beep(170, 0.3, 'square', 0.07), 150); },
  pow() { beep(440, 0.22, 'triangle', 0.09, 500); },
  warn() { beep(140, 0.45, 'square', 0.06, 25); },
  click() { beep(990, 0.04, 'square', 0.04); }
};

  { c: '鸟', p: 'niǎo', m: 'bird', t: 2 }, { c: '猫', p: 'māo', m: 'cat', t: 2 },

  { c: '花', p: 'huā', m: 'flower', t: 2 }, { c: '车', p: 'chē', m: 'car', t: 2 },
  { c: '吃', p: 'chī', m: 'to eat', t: 3 }, { c: '喝', p: 'hē', m: 'to drink', t: 3 },
  { c: '看', p: 'kàn', m: 'to look / watch', t: 3 }, { c: '听', p: 'tīng', m: 'to listen', t: 3 },
  { c: '说', p: 'shuō', m: 'to speak', t: 3 }, { c: '走', p: 'zǒu', m: 'to walk', t: 3 },
  { c: '跑', p: 'pǎo', m: 'to run', t: 3 }, { c: '来', p: 'lái', m: 'to come', t: 3 },
  { c: '去', p: 'qù', m: 'to go', t: 3 }, { c: '坐', p: 'zuò', m: 'to sit', t: 3 },

/* ---------- input ---------- */
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'boot') { audioInit(); openIntro(); return; }
  if (state === 'intro') { openTitle(); return; }
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyP' || e.code === 'Escape') togglePause();
});
addEventListener('keyup', e => { keys[e.code] = false; });

let ptr = { down: false, x: 0, y: 0, lx: 0, ly: 0 };
function toGame(e) {
  const r = cv.getBoundingClientRect();
  return { x: (e.clientX - r.left) / r.width * W, y: (e.clientY - r.top) / r.height * H };
}
cv.addEventListener('pointerdown', e => {
  audioInit();
  const p = toGame(e);
  ptr.down = true; ptr.x = ptr.lx = p.x; ptr.y = ptr.ly = p.y;
  cv.setPointerCapture(e.pointerId);
  onTap(p.x, p.y);
  e.preventDefault();
});
cv.addEventListener('pointermove', e => {
  if (!ptr.down) return;
  const p = toGame(e);
  ptr.x = p.x; ptr.y = p.y;
  e.preventDefault();
});
cv.addEventListener('pointerup', e => { ptr.down = false; });
cv.addEventListener('pointercancel', e => { ptr.down = false; });

/* ---------- resize / letterbox ---------- */
function resize() {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const aw = window.innerWidth, ah = window.innerHeight;
  const s = Math.min(aw / W, ah / H);
  cv.style.width = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
  cv.width = Math.round(W * s * dpr);
  cv.height = Math.round(H * s * dpr);
  mctx.setTransform(cv.width / W, 0, 0, cv.height / H, 0, 0);
  mctx.imageSmoothingEnabled = false;
}
addEventListener('resize', resize);
resize();

/* ============================================================
   GAME STATE
   ============================================================ */
let state = 'title';            // title | overworld | play | quiz | upgrade | bossintro | boss | clear | gameover | victory | pause
let prevState = 'play';
let score = 0;
let best = store.get('nt67_best', 0);
let unlocked = store.get('nt67_unlocked', 1);
let levelIdx = 0;               // 0..4
let levelTime = 0, spawnT = 0, quizT = 0, quizDone = 0;
let boss = null, bossIntroT = 0, flashT = 0, shakeT = 0, shakeAmt = 0;
let player = null, snapshot = null;
let pB = [], eB = [], enemies = [], parts = [], floaters = [];
let bg = null;
let ow = { ship: 0, anim: null };   // overworld ship node + animation
let streak = 0, answered = 0, correct = 0;
let mode = store.get('nt67_mode', 'normal');   // 'normal' | 'danger'
let pilot = store.get('nt67_pilot', 0);
const PILOTS = [
  { name: 'JACKSON', role: 'STRIKE LEADER', skin: '#ffd9b8', hair: '#ffd24a', iris: '#2456c4', chibi: false,
    cols: { hull: '#f2f5ff', hull2: '#aeb9d6', accent: '#e23a52', accentHi: '#ff5d76', trim: '#ffd24a', intake: '#2456c4' } },
  { name: 'ARTHUR', role: 'GENERAL', skin: '#f2c89a', hair: '#241a30', iris: '#241a30', chibi: false,

function fireWeapons(p, dt) {
  for (const id in p.weapons) {
    const w = WEAPONS[id], l = p.weapons[id];
    p.cds[id] = (p.cds[id] || 0) - dt;
    if (p.cds[id] <= 0) {
      w.fire(p, l);
      p.cds[id] = w.cd(l) / p.rateMul;
      if (id === 'vulcan') sfx.shoot();
    }
  }
  // drones
  if (p.drones > 0) {
    p.droneA += dt * 2.4;
    p.cds._d = (p.cds._d || 0) - dt;
    if (p.cds._d <= 0) {
      for (let i = 0; i < p.drones; i++) {
        const a = p.droneA + i * TAU / p.drones;
        const dx = p.x + Math.cos(a) * 34, dy = p.y + Math.sin(a) * 34;
        pB.push({ x: dx + 8, y: dy, vx: 600, vy: 0, r: 3, dmg: 1, col: '#9ffcf0', kind: 'shot' });
      }
      p.cds._d = 0.24 / p.rateMul;
    }
  }
  // blast bombs: lobbed on a timer
  if (p.bomb) {
    p.cds._bm = (p.cds._bm === undefined ? 0.8 : p.cds._bm) - dt;
    if (p.cds._bm <= 0) {
      pB.push({ kind: 'bomb', x: p.x + 12, y: p.y, vx: 330, vy: -80, g: 310, r: 7, dmg: 0, fuse: 1.05, blvl: p.bomb, col: '#3a4668' });
      p.cds._bm = 3.4 - 0.5 * p.bomb;
      sfx.click();
    }
  }
}

function explodeBomb(b) {
  const R = 78 + b.blvl * 22, dmg = 5 + b.blvl * 2;
  flashFx(b.x, b.y, R * 0.85, '#ffd24a'); ring(b.x, b.y, '#ff8d3a', 360); burst(b.x, b.y, '#ff8d3a', 22, 270);
  shake(5, 0.15); sfx.boom();
  for (let j = enemies.length - 1; j >= 0; j--) {
    const e = enemies[j];
    if ((e.x - b.x) ** 2 + (e.y - b.y) ** 2 < (R + e.r) ** 2) damageEnemy(e, dmg, enemies, j);
  }
  if (boss && !boss.entering && (boss.x - b.x) ** 2 + (boss.y - b.y) ** 2 < (R + boss.r) ** 2) {
    boss.hp -= dmg; boss.flash = 0.08;
    if (boss.hp <= 0) bossDown();
  }
}

let lastDeclined = null;
function upgradePool(p) {
  const pool = [];
  for (const wid of ['vulcan', 'spread', 'laser', 'missile', 'wave']) {
    const owned = p.weapons[wid];
    if (owned && owned < 4) pool.push({ id: 'w_' + wid, desc: 'Upgrade to LV.' + (owned + 1), tag: 'LV.' + (owned + 1) });
    else if (!owned && Object.keys(p.weapons).filter(k => k !== 'hyper').length < 3)
      pool.push({ id: 'w_' + wid, desc: 'New weapon system', tag: 'NEW' });
  }
  if (p.shield < 4) pool.push({ id: 'shield', desc: '+2 shield charges', tag: '+2' });
  if (p.maxHp < 9) pool.push({ id: 'hp', desc: '+1 max HP and repair +2', tag: '+1' });
  if (p.speed < 420) pool.push({ id: 'speed', desc: '+12% flight speed', tag: '+SPD' });
  if (!p.mini) pool.push({ id: 'mini', desc: 'Smaller ship, harder to hit', tag: '1x' });
  if (p.drones < 2) pool.push({ id: 'drone', desc: 'Orbiting drone that fires with you', tag: '+1' });
  if (p.rateMul < 1.45) pool.push({ id: 'rate', desc: '+15% fire rate, all weapons', tag: '+ROF' });
  if (p.bomb < 3) pool.push({ id: 'bomb', desc: 'Lob an area-blast bomb every few seconds', tag: p.bomb ? 'LV.' + (p.bomb + 1) : 'NEW' });
  if (!p.defl) pool.push({ id: 'deflector', desc: 'Reflects 10 shots back at enemies, then 20s recharge', tag: 'NEW' });
  let out = shuffle(pool);
  if (out.length > 2 && lastDeclined) {
    const f = out.filter(o => o.id !== lastDeclined);
    if (f.length >= 2) out = f;
  }
  return out.slice(0, 2);
}

function applyUpgrade(p, u) {
  if (u.id.startsWith('w_')) { const wid = u.id.slice(2); p.weapons[wid] = (p.weapons[wid] || 0) + 1; }
  else if (u.id === 'shield') p.shield = Math.min(4, p.shield + 2);
  else if (u.id === 'hp') { p.maxHp++; p.hp = Math.min(p.maxHp, p.hp + 2); }
  else if (u.id === 'speed') p.speed *= 1.12;
  else if (u.id === 'mini') { p.mini = true; p.r = 9; p.baseR = 9; }
  else if (u.id === 'drone') p.drones++;
  else if (u.id === 'rate') p.rateMul *= 1.15;
  else if (u.id === 'bomb') p.bomb = (p.bomb || 0) + 1;
  else if (u.id === 'deflector') p.defl = { hits: 10, cd: 0 };
  sfx.pow();
}

const LEVEL_TIER = [1, 2, 2, 3, 3];

const qDecks = {};
function drawFromDeck(lo, hi) {
  const k = lo + '_' + hi;
  if (!qDecks[k] || !qDecks[k].length) qDecks[k] = shuffle(CHARS.filter(x => x.t >= lo && x.t <= hi).slice());
  return qDecks[k].pop();
}

function makeQuestion(li, hard) {
  let tier = LEVEL_TIER[li] + (hard ? 1 : 0);
  tier = clamp(tier, 1, 4);
  const lo = hard ? tier : Math.max(1, tier - 1);
  const q = drawFromDeck(lo, tier);
  const mode = (li >= 2 && Math.random() < (hard ? 0.5 : 0.3)) ? 'pinyin' : 'meaning';
  const key = mode === 'pinyin' ? 'p' : 'm';
  const wrongs = shuffle(CHARS.filter(x => x !== q && x[key] !== q[key])).slice(0, 3);
  const opts = shuffle([q, ...wrongs]);
  return { q, opts, mode, key, hard };
}

function openQuiz(hard) {
  setState('quiz');
  const Q = makeQuestion(levelIdx, hard);
  const prompt = Q.mode === 'pinyin' ? 'How do you say it?' : 'What does it mean?';
  let html = '<div class="box quiz' + (hard ? ' hot' : '') + '">';
  html += hard
    ? '<div class="eyebrow alert">⚠ PRIORITY TRANSMISSION — HQ ARMORY</div>'
    : '<div class="eyebrow">TRANSMISSION FROM HQ</div>';
  html += '<div class="hanzi">' + Q.q.c + '</div>';
  html += '<div class="prompt">' + prompt + '</div>';
  html += '<div class="ans">';
  Q.opts.forEach((o, i) => { html += '<button class="btn ans-btn" data-i="' + i + '">' + o[Q.key] + '</button>'; });
  html += '</div>';
  html += hard ? '<div class="hint">Answer correctly to arm the ' + WEAPONS[SUPER_FOR(levelIdx)].name + ' for the boss fight</div>'
               : '<div class="hint">Answer correctly to earn an upgrade</div>';
  html += '</div>';
  showPanel(html);
  panel.querySelectorAll('.ans-btn').forEach(b => {
    b.addEventListener('click', () => {
      const i = +b.dataset.i, ok = Q.opts[i] === Q.q;
      answered++;
      panel.querySelectorAll('.ans-btn').forEach((bb, j) => {
        bb.disabled = true;
        if (Q.opts[j] === Q.q) bb.classList.add('right');
        else if (j === i) bb.classList.add('wrong');
      });
      if (ok) {
        correct++; streak++;
        score += (hard ? 800 : 400) + streak * 50;
        sfx.good();
        const note = panel.querySelector('.hint');
        note.textContent = '✓ 对了! (' + Q.q.c + ' ' + Q.q.p + ' = ' + Q.q.m + ')   +' + ((hard ? 800 : 400) + streak * 50);
        note.classList.add('ok');
        setTimeout(() => { hard ? grantSuper() : openUpgrade(); }, 1100);
      } else {
        streak = 0;
        sfx.bad();
        const note = panel.querySelector('.hint');
        note.textContent = '✗ ' + Q.q.c + ' = ' + Q.q[Q.key] + ' (' + Q.q.p + ', ' + Q.q.m + ')';
        note.classList.add('no');
        if (mode === 'danger') {
          const dmsg = downgradeRandom(player);

        if (hard) vox('Negative.');
        setTimeout(() => { hard ? startBossIntro() : resumePlay(); }, 1700);
      }
      updateHud();
    });
  });
}

function grantSuper() {

function openUpgrade() {

  if (!opts.length) { resumePlay(); return; }
  let html = '<div class="box"><div class="eyebrow">SUPPLY DROP — CHOOSE ONE</div><div class="cards">';
  opts.forEach((o, i) => {

function downgradeRandom(p) {
  const opts = [];
  const realWeapons = Object.keys(p.weapons).filter(k => k !== 'hyper' && k !== 'flame');
  for (const wid of realWeapons) {
    if (wid === 'vulcan' && p.weapons.vulcan <= 1) continue;            // the starting cannon is the floor
    if (p.weapons[wid] <= 1 && realWeapons.length <= 1) continue;       // never leave the ship weaponless
    opts.push({ t: 'w', id: wid });
  }
  if (p.shield > 0) opts.push({ t: 'shield' });
  if (p.drones > 0) opts.push({ t: 'drone' });
  if (p.rateMul > 1.01) opts.push({ t: 'rate' });
  if (p.speed > 275) opts.push({ t: 'speed' });
  if (p.maxHp > 5) opts.push({ t: 'hp' });
  if (p.bomb > 0) opts.push({ t: 'bomb' });
  if (p.defl) opts.push({ t: 'defl' });
  if (!opts.length) return null;
  const o = pick(opts);
  if (o.t === 'w') {
    p.weapons[o.id]--;
    if (p.weapons[o.id] <= 0) { delete p.weapons[o.id]; return WEAPONS[o.id].name + ' LOST'; }
    return WEAPONS[o.id].name + ' → LV.' + p.weapons[o.id];
  }
  if (o.t === 'shield') { p.shield = Math.max(0, p.shield - 2); return 'SHIELD -2'; }
  if (o.t === 'drone') { p.drones--; return 'DRONE LOST'; }
  if (o.t === 'rate') { p.rateMul = Math.max(1, p.rateMul / 1.15); return 'OVERCLOCK LOST'; }
  if (o.t === 'bomb') { p.bomb--; return p.bomb ? 'BOMBS → LV.' + p.bomb : 'BOMBS LOST'; }
  if (o.t === 'defl') { p.defl = null; return 'DEFLECTOR LOST'; }
  if (o.t === 'speed') { p.speed = Math.max(270, p.speed / 1.12); return 'AFTERBURNERS LOST'; }
  p.maxHp--; p.hp = Math.min(p.hp, p.maxHp); return 'MAX ARMOR -1';
}

function resumePlay() {
  hidePanel();
  setState(boss ? 'boss' : 'play');
}

const E_DEFS = {

  sine:    { hp: 2, r: 16, pts: 120, col: '#7dff6a' },

  shooter: { hp: 4, r: 18, pts: 220, col: '#6ae4ff' },
  diver:   { hp: 3, r: 16, pts: 180, col: '#e07dff' },
  pop:     { hp: 1, r: 10, pts: 60,  col: '#ff8d5c' },
  tank:    { hp: 10, r: 26, pts: 400, col: '#9aa7c7' }
};
const LEVEL_ENEMIES = [
  ['drone', 'sine', 'pop'],
  ['drone', 'sine', 'zig', 'shooter'],
  ['sine', 'zig', 'shooter', 'diver', 'pop'],
  ['zig', 'shooter', 'diver', 'tank', 'pop'],
  ['drone', 'sine', 'zig', 'shooter', 'diver', 'tank', 'pop']
];

function diffMul() { return 1 + levelIdx * 0.5 + Math.min(0.9, levelTime / 90); }

function spawnEnemy(type, y, opts) {
  const d = E_DEFS[type], m = diffMul();
  // from sector 2 on, enemy armor tracks the player's firepower so a stacked
  // loadout no longer deletes everything at the right edge of the screen
  const pf = levelIdx >= 1 && player ? clamp(estimateDPS(player) / 14, 1, 3.5) : 1;
  const hp = Math.ceil(d.hp * m * pf * 0.9);
  enemies.push(Object.assign({
    type, x: W + 40, y: y == null ? rnd(60, H - 60) : y,
    hp, maxHp: hp,
    r: d.r, pts: d.pts, col: d.col, t: rnd(0, TAU), ph: rnd(0, TAU), fireT: rnd(0.6, 1.8),
    vx: -(90 + 38 * m) * rnd(0.85, 1.15), baseY: y == null ? 0 : y, flash: 0
  }, opts || {}));
}

function spawnWave() {
  const types = LEVEL_ENEMIES[levelIdx];
  const roll = Math.random();
  if (roll < 0.25) { // formation row
    const t = pick(types.filter(x => x !== 'tank')) || 'drone';
    const y = rnd(70, H - 70);
    for (let i = 0; i < 4; i++) setTimeout(() => { if (state === 'play') spawnEnemy(t, y); }, i * 260);
  } else if (roll < 0.4 && types.includes('pop')) { // swarm
    for (let i = 0; i < 6; i++) spawnEnemy('pop', rnd(50, H - 50));
  } else {
    spawnEnemy(pick(types));
  }
}

function enemyShoot(e, aimed, spd, n) {
  spd = spd || 200 + levelIdx * 28;
  const a0 = aimed ? Math.atan2(player.y - e.y, player.x - e.x) : Math.PI;
  n = n || 1;
  for (let i = 0; i < n; i++) {
    const a = a0 + (i - (n - 1) / 2) * 0.22;
    eB.push({ x: e.x, y: e.y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: 5 });
  }
}

function updateEnemies(dt) {
  const m = diffMul();
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.t += dt; e.flash = Math.max(0, e.flash - dt);
    switch (e.type) {
      case 'drone': e.x += e.vx * dt; break;
      case 'sine': e.x += e.vx * dt; e.y += Math.sin(e.t * 3.2) * 110 * dt; break;
      case 'zig': e.x += e.vx * dt; e.y += (Math.floor(e.t * 1.6) % 2 ? 1 : -1) * 150 * dt; break;
      case 'pop': e.x += e.vx * 1.5 * dt; e.y += Math.sin(e.t * 6) * 60 * dt; break;
      case 'shooter':
        e.x += (e.x > W - 220 ? e.vx : e.vx * 0.12) * dt;
        e.y += Math.sin(e.t * 1.4) * 50 * dt;
        e.fireT -= dt;
        if (e.fireT <= 0 && e.x < W - 30) { enemyShoot(e, true, null, levelIdx >= 3 ? 3 : 1); e.fireT = rnd(1.5, 2.6) / Math.sqrt(m); }
        break;
      case 'diver':
        e.x += e.vx * 0.9 * dt;
        e.y += clamp(player.y - e.y, -160, 160) * 1.5 * dt;
        break;
      case 'tank':
        e.x += e.vx * 0.45 * dt;
        e.fireT -= dt;
        if (e.fireT <= 0 && e.x < W - 30) { enemyShoot(e, false, 170, 2); e.fireT = rnd(1.3, 2.0) / Math.sqrt(m); }
        break;
    }
    e.y = clamp(e.y, 26, H - 26);
    if (e.x < -60) {
      enemies.splice(i, 1);
      if (mode === 'danger' && state === 'play') {
        score = Math.max(0, score - 25);

const BOSS_DEFS = [
  { name: 'RAIDEN MK-0', pilot: 'CAPTAIN SKARN', sub: 'Vanguard Gunship', col: '#ff6a8a', col2: '#ffd24a', hp: 130, style: 0 },
  { name: 'KAIYŌ CARRIER', pilot: 'MOTHER VELGA', sub: 'Drone Mothercraft', col: '#7dff6a', col2: '#6ae4ff', hp: 190, style: 1 },
  { name: 'TSURUGI-X', pilot: 'KIRO TWINBLADE', sub: 'Twin-Blade Interceptor', col: '#6ae4ff', col2: '#e07dff', hp: 250, style: 2 },
  { name: 'KŌTETSU FORTRESS', pilot: 'WARLORD TETSUO', sub: 'Siege Platform', col: '#ffd24a', col2: '#ff8d5c', hp: 330, style: 3 },
  { name: 'ŌKAMI PRIME', pilot: 'EMPEROR ZAHHAK', sub: 'Invasion Flagship', col: '#ff4d6d', col2: '#9ffcf0', hp: 430, style: 4 }
];

const SUPER_FOR = li => li % 2 === 0 ? 'hyper' : 'flame';

function estimateDPS(p) {
  let dps = 0;
  const HITF = { vulcan: 1, spread: 0.6, laser: 1, missile: 1, wave: 0.85 };
  for (const id in p.weapons) {
    if (id === 'hyper' || id === 'flame') continue;
    const l = p.weapons[id], cd = WEAPONS[id].cd(l) / p.rateMul;
    let per = 0;
    if (id === 'vulcan') per = (l >= 4 ? 3 : l >= 2 ? 2 : 1);
    else if (id === 'spread') per = (l >= 3 ? 5 : 3);
    else if (id === 'laser') per = 2 + l;
    else if (id === 'missile') per = (l >= 4 ? 3 : l >= 2 ? 2 : 1) * 2;
    else if (id === 'wave') per = (l >= 3 ? 2 : 1) * 2;
    dps += per * (HITF[id] || 1) / cd;
  }
  dps += p.drones * (p.rateMul / 0.24);
  if (p.bomb) dps += (5 + 2 * p.bomb) / (3.4 - 0.5 * p.bomb);
  return Math.max(6, dps);
}

function makeBoss() {
  const d = BOSS_DEFS[levelIdx];
  // HP scales with the player's actual firepower:
  // ~18-28s to kill unaided; the super weapon (~62 dps) pulls that to ~5-10s
  const hp = Math.round(clamp(estimateDPS(player) * rnd(18, 28) * 1.2 * (1 + levelIdx * 0.05), 320, 6200));
  return {
    def: d, hp, maxHp: hp, x: W + 160, y: H / 2, r: 52, t: 0,
    atkT: 2, atkIdx: 0, entering: true, flash: 0, minionT: 4
  };
}

function updateBoss(b, dt) {
  b.t += dt; b.flash = Math.max(0, b.flash - dt);
  if (b.entering) {
    b.x += (W - 150 - b.x) * 2.2 * dt;
    if (b.x < W - 146) b.entering = false;
    return;
  }
  b.y = H / 2 + Math.sin(b.t * 0.55) * (H / 2 - 110);
  const m = 1 + levelIdx * 0.18;
  const phase2 = b.hp < b.maxHp * 0.5;
  b.atkT -= dt;
  if (b.atkT <= 0) {
    const s = b.def.style;
    const moves = ['aim', 'ring', 'wall'];
    if (s === 1 || s === 4) moves.push('minion');
    if (s >= 2) moves.push('spiral');
    const mv = moves[b.atkIdx % moves.length]; b.atkIdx++;
    if (mv === 'aim') {
      const n = phase2 ? 5 : 3;
      for (let i = 0; i < n; i++) setTimeout(() => { if (boss) enemyShoot(b, true, 250 * m, 1); }, i * 160);
    } else if (mv === 'ring') {
      const n = phase2 ? 14 : 10;
      for (let i = 0; i < n; i++) {
        const a = i / n * TAU + b.t;
        eB.push({ x: b.x - 30, y: b.y, vx: Math.cos(a) * 150 * m, vy: Math.sin(a) * 150 * m, r: 5 });
      }
      sfx.warn();
    } else if (mv === 'wall') {
      const gap = rnd(70, H - 70);
      for (let y = 30; y < H; y += 42) {
        if (Math.abs(y - gap) < 64) continue;
        eB.push({ x: W - 10, y, vx: -190 * m, vy: 0, r: 5 });
      }
    } else if (mv === 'spiral') {
      for (let i = 0; i < 16; i++) {
        setTimeout(() => {
          if (!boss) return;
          const a = Math.PI + Math.sin(i * 0.45) * 0.9;
          eB.push({ x: b.x - 40, y: b.y, vx: Math.cos(a) * 230 * m, vy: Math.sin(a) * 230 * m, r: 5 });
        }, i * 90);
      }
    } else if (mv === 'minion') {
      spawnEnemy('pop', b.y - 40, { x: b.x - 50 });
      spawnEnemy('pop', b.y + 40, { x: b.x - 50 });
      if (phase2) spawnEnemy('diver', b.y, { x: b.x - 50 });
    }
    b.atkT = (phase2 ? 1.5 : 2.1) / Math.sqrt(m);
  }
}

function startBossIntro() {
  hidePanel();
  enemies.length = 0; eB.length = 0;
  boss = makeBoss();
  bossIntroT = 0;
  setState('bossintro');
  sfx.warn(); setTimeout(sfx.warn, 500); setTimeout(sfx.warn, 1000);
}

function hexLerp(a, b, t) {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const r = ((pa >> 16) + (((pb >> 16) - (pa >> 16)) * t)) | 0;
  const gg = (((pa >> 8) & 255) + ((((pb >> 8) & 255) - ((pa >> 8) & 255)) * t)) | 0;
  const bl = ((pa & 255) + (((pb & 255) - (pa & 255)) * t)) | 0;
  return 'rgb(' + r + ',' + gg + ',' + bl + ')';
}
function sampleStops(stops, t) {
  const seg = t * (stops.length - 1), i = Math.min(stops.length - 2, seg | 0);
  return hexLerp(stops[i], stops[i + 1], seg - i);
}

function buildSky(li) {
  const th = THEMES[li];

  const g = c.getContext('2d');

  const NB = 18, bandH = Math.ceil(H / NB);
  for (let i = 0; i < NB; i++) {
    g.fillStyle = sampleStops(th.sky, i / (NB - 1));
    g.fillRect(0, i * bandH, W, bandH);
    if (i > 0) { // checker dither into previous band
      for (let x = 0; x < W; x += 8) {
        if (((x / 8) + i) % 2) g.fillRect(x, i * bandH - 4, 4, 4);
        g.fillRect(x + 4 * ((i % 2)), i * bandH, 4, 4);
      }
    }
  }
  // horizon glow
  if (th.glow) {
    const rg = g.createRadialGradient(th.glow.x, th.glow.y, 10, th.glow.x, th.glow.y, th.glow.r);
    rg.addColorStop(0, th.glow.col); rg.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = rg; g.fillRect(0, 0, W, H);
  }
  // streak clouds: long flat bars with a bright top edge
  const streaks = li === 2 ? 0 : ri(9, 14);     // day level uses live puffy clouds instead
  for (let i = 0; i < streaks; i++) {
    const y = rnd(14, H * 0.55), w2 = rnd(90, 340), x = rnd(-40, W - 60), h2 = ri(4, 9);

    g.fillStyle = th.night ? 'rgba(255,255,255,0.16)' : 'rgba(255,255,255,0.4)';
    g.fillRect(x + 4, y, w2 - 22, 2);

  if (th.night && !th.sun) {

  // painterly distant terrain band per theme

    const tones = li === 2 ? ['#2c5e4a', '#1f4a38', '#15382a'] : ['#1a1838', '#13122c', '#0c0b20'];

      const nx = px + 460;
      g.strokeStyle = F; g.lineWidth = 4;
      g.beginPath(); g.moveTo(px + 4, 142); g.quadraticCurveTo(px + 230, 208, nx + 4, 142); g.stroke();
      g.fillStyle = '#ffe9a3';
      for (let i = 1; i < 5; i++) {
        const tt = i / 5, cx2 = px + 4 + (nx - px) * tt, cy2 = 142 + (208 - 142) * 4 * tt * (1 - tt) * 0.97;
        g.fillRect(cx2 - 1.5, cy2 + 4, 3, 3);
      }
    }
  } else if (li === 1) { // dock rail, bollards, crane legs
    for (let px = 0; px < W * 2; px += 46) { g.fillStyle = F; g.fillRect(px, H - 92, 6, 92); }
    g.fillStyle = F; g.fillRect(0, H - 96, W * 2, 7);
    for (let px = ri(100, 300); px < W * 2; px += ri(420, 700)) {
      g.fillStyle = F;
      g.beginPath(); g.ellipse(px, H - 30, 16, 22, 0, 0, TAU); g.fill();
      g.fillRect(px - 19, H - 58, 38, 12);
    }
    for (let px = ri(300, 600); px < W * 2; px += ri(800, 1100)) {
      g.fillStyle = F; g.fillRect(px, 0, 26, H);
      g.fillRect(px - 14, 90, 54, 10); g.fillRect(px - 14, 260, 54, 10);
    }
  } else if (li === 2) { // guardrail + lamps + overhead gantries
    g.fillStyle = F; g.fillRect(0, H - 46, W * 2, 8);
    for (let px = 0; px < W * 2; px += 90) g.fillRect(px, H - 46, 6, 46);
    for (let px = ri(150, 400); px < W * 2; px += ri(700, 1000)) {
      g.fillStyle = F;
      g.fillRect(px, 0, 14, H - 38); g.fillRect(px + 560, 0, 14, H - 38);
      g.fillRect(px - 10, 38, 594, 18);
      g.fillStyle = '#155e38'; g.fillRect(px + 180, 60, 200, 52);
      g.strokeStyle = '#cfe8d8'; g.lineWidth = 3; g.strokeRect(px + 186, 66, 188, 40);
      g.fillStyle = '#eafff2'; g.font = '17px "Hiragino Sans","PingFang SC",sans-serif';
      g.fillText('第67区 NEO TOKYO', px + 200, 92);
    }
  } else if (li === 3) { // pipes, girders, valves
    g.fillStyle = F;
    g.fillRect(0, H - 58, W * 2, 18);
    for (let px = 0; px < W * 2; px += 130) { g.fillRect(px, H - 64, 12, 30); g.beginPath(); g.arc(px + 6, H - 70, 10, 0, TAU); g.fill(); }
    g.fillRect(0, H - 30, W * 2, 12);
    for (let px = ri(160, 420); px < W * 2; px += ri(520, 820)) {
      g.fillRect(px, 0, 22, H);
      g.strokeStyle = F; g.lineWidth = 9;
      g.beginPath(); g.moveTo(px - 60, 90); g.lineTo(px + 82, 190); g.moveTo(px + 82, 90); g.lineTo(px - 60, 190); g.stroke();
    }
  } else { // pine branches above + stone lanterns below
    for (let px = ri(0, 240); px < W * 2; px += ri(420, 680)) {
      g.fillStyle = F;
      g.fillRect(px + 28, 0, 12, 56);
      for (let br = 0; br < 3; br++) {
        const ww = 130 - br * 34, yy = 26 + br * 26;
        g.beginPath(); g.moveTo(px + 34 - ww / 2, yy + 22); g.lineTo(px + 34 + ww / 2, yy + 22); g.lineTo(px + 34, yy - 8); g.closePath(); g.fill();
      }
    }
    for (let px = ri(140, 380); px < W * 2; px += ri(520, 800)) {
      g.fillStyle = F;
      g.fillRect(px + 8, H - 60, 14, 60);
      g.fillRect(px, H - 74, 30, 16); g.fillRect(px - 7, H - 82, 44, 9);
      g.fillRect(px + 4, H - 96, 22, 14);
    }
  }
  return { c, deco: [] };
}

function buildBG(li) {
  const th = THEMES[li];
  const L = [buildLayer(li, 0), buildLayer(li, 1), buildLayer(li, 2), buildFore(li)];
  bg = {
    skyC: buildSky(li),
    th, li, off: [0, 0, 0, 0], speeds: [16, 55, 135, 255],
    layers: L.map(o => o.c), deco: L.map(o => o.deco),
    stars: th.night ? Array.from({ length: 80 }, () => ({ x: rnd(0, W), y: rnd(0, H * 0.55), r: rnd(0.6, 1.8), tw: rnd(0, TAU) })) : null,
    clouds: li === 2 ? Array.from({ length: 6 }, () => ({ x: rnd(0, W), y: rnd(26, 168), s: rnd(0.7, 1.5), v: rnd(8, 18) })) : null,
    smoke: [], embers: [],
    flies: li === 4 ? Array.from({ length: 14 }, () => ({ x: rnd(0, W), y: rnd(H * 0.45, H - 40), ph: rnd(0, TAU) })) : null,
    cars: li === 0 ? Array.from({ length: 6 }, () => ({ x: rnd(0, W), v: rnd(160, 330), dir: Math.random() < 0.5 ? 1 : -1 })) : null,
    shoot: rnd(3, 7), shootA: null
  };
}

function drawFuji(g, big, night) {
  const fx = big ? W * 0.6 : W * 0.72, fw = big ? 560 : 320, fh = big ? 320 : 170, fy = H - 56;
  g.fillStyle = night ? '#2a2260' : '#9db5dd';
  g.beginPath();
  g.moveTo(fx - fw / 2, fy); g.lineTo(fx - fw * 0.1, fy - fh);
  g.lineTo(fx + fw * 0.1, fy - fh); g.lineTo(fx + fw / 2, fy);
  g.closePath(); g.fill();
  // ridge shading
  g.fillStyle = night ? 'rgba(8,6,26,0.45)' : 'rgba(60,80,140,0.3)';
  g.beginPath(); g.moveTo(fx + fw * 0.1, fy - fh); g.lineTo(fx + fw / 2, fy); g.lineTo(fx + fw * 0.16, fy); g.closePath(); g.fill();
  // snow cap
  g.fillStyle = night ? '#d6dcff' : '#ffffff';
  g.beginPath();
  g.moveTo(fx - fw * 0.1, fy - fh); g.lineTo(fx + fw * 0.1, fy - fh);
  g.lineTo(fx + fw * 0.17, fy - fh * 0.72);
  g.lineTo(fx + fw * 0.08, fy - fh * 0.79); g.lineTo(fx, fy - fh * 0.7);
  g.lineTo(fx - fw * 0.08, fy - fh * 0.79); g.lineTo(fx - fw * 0.17, fy - fh * 0.72);
  g.closePath(); g.fill();
}

function drawDeco(i, now, dt) {
  for (const d of bg.deco[i]) {
    for (const base of [d.x - bg.off[i], d.x - bg.off[i] + W * 2]) {
      if (base < -50 || base > W + 50) continue;
      if (d.k === 'blink') {
        const on = Math.sin(now / 320 + d.x * 0.13) > 0.1;
        ctx.fillStyle = d.col; ctx.globalAlpha = on ? 1 : 0.15;
        ctx.beginPath(); ctx.arc(base, d.y, 2.6, 0, TAU); ctx.fill();
        if (on) { ctx.globalAlpha = 0.25; ctx.beginPath(); ctx.arc(base, d.y, 7, 0, TAU); ctx.fill(); }
        ctx.globalAlpha = 1;
      } else if (d.k === 'glow') {
        ctx.fillStyle = d.col; ctx.globalAlpha = 0.25 + 0.2 * Math.sin(now / 90 + d.x);
        ctx.beginPath(); ctx.arc(base, d.y, 18, 0, TAU); ctx.fill(); ctx.globalAlpha = 1;
      } else if (d.k === 'lantern') {
        const gl = 0.55 + 0.3 * Math.sin(now / 420 + d.x * 0.2);
        ctx.fillStyle = '#ffb04a'; ctx.globalAlpha = gl;
        ctx.beginPath(); ctx.arc(base, d.y, 5, 0, TAU); ctx.fill();
        ctx.globalAlpha = gl * 0.3; ctx.beginPath(); ctx.arc(base, d.y, 13, 0, TAU); ctx.fill();
        ctx.globalAlpha = 1;
      } else if (d.k === 'smoke' && dt > 0) {
        d.t -= dt;
        if (d.t <= 0) { bg.smoke.push({ lx: d.x, y: d.y, r: 5, life: 2.2, drift: rnd(-6, 6) }); d.t = rnd(0.35, 0.7); }
      }
    }
  }
}

function drawWaterHarbor(now) {
  const wy = H - 84;
  const g2 = ctx.createLinearGradient(0, wy, 0, H);
  g2.addColorStop(0, '#35527a'); g2.addColorStop(1, '#101e38');
  ctx.fillStyle = g2; ctx.fillRect(0, wy, W, 84);
  for (let i = 0; i < 22; i++) {
    const yy = wy + 5 + i * 3.4;
    ctx.fillStyle = 'rgba(255,190,120,' + Math.max(0, 0.4 - i * 0.018) + ')';
    const ww = 26 + Math.sin(now / 480 + i * 1.7) * 18;
    ctx.fillRect(W * 0.72 - ww / 2 + Math.sin(now / 600 + i) * 26, yy, ww, 2);
  }
  // patrolling tanker silhouette
  const shx = W + 160 - ((now / 38) % (W + 420));
  ctx.fillStyle = '#180e22';
  ctx.fillRect(shx, wy - 16, 110, 16);
  ctx.fillRect(shx + 22, wy - 32, 26, 16);
  ctx.fillStyle = '#ffd24a'; ctx.fillRect(shx + 30, wy - 28, 3, 3);
}

function drawBG(dt, scrollMul) {
  const th = bg.th, li = bg.li, now = performance.now();
  ctx.drawImage(bg.skyC, 0, 0);
  if (bg.stars) {
    ctx.fillStyle = '#fff';
    for (const s of bg.stars) {
      ctx.globalAlpha = 0.3 + 0.6 * Math.abs(Math.sin(s.tw + now / 900));
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
    ctx.globalAlpha = 1;
  }
  // drifting clouds (day)
  if (bg.clouds) for (const cl of bg.clouds) {
    cl.x -= cl.v * scrollMul * dt;
    if (cl.x < -180) { cl.x = W + 180; cl.y = rnd(26, 168); }
    ctx.save(); ctx.translate(cl.x, cl.y); ctx.scale(cl.s, cl.s);
    ctx.fillStyle = 'rgba(70,100,160,0.18)'; ctx.beginPath(); ctx.ellipse(4, 8, 52, 13, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-26, 2, 18, 0, TAU); ctx.arc(0, -8, 24, 0, TAU); ctx.arc(28, 2, 17, 0, TAU); ctx.fill();
    ctx.fillRect(-40, 2, 82, 12);
    ctx.restore();
  }
  // parallax layers + their animated deco
  for (let i = 0; i < 4; i++) {
    bg.off[i] = (bg.off[i] + bg.speeds[i] * scrollMul * dt) % (W * 2);
    if (li === 1 && i === 2) drawWaterHarbor(now);
    ctx.drawImage(bg.layers[i], -bg.off[i], 0);
    ctx.drawImage(bg.layers[i], -bg.off[i] + W * 2, 0);
    drawDeco(i, now, dt);
  }
  // rising smoke (foundry stacks)
  for (let i = bg.smoke.length - 1; i >= 0; i--) {
    const p = bg.smoke[i];
    if (dt > 0) { p.life -= dt; p.y -= 26 * dt; p.r += 9 * dt; p.lx += p.drift * dt; p.lx += bg.speeds[2] * scrollMul * dt * 0; }
    const sxs = ((p.lx - bg.off[2]) % (W * 2) + W * 2) % (W * 2);
    if (p.life <= 0) { bg.smoke.splice(i, 1); continue; }
    ctx.fillStyle = 'rgba(150,130,140,' + Math.max(0, p.life * 0.22) + ')';
    ctx.beginPath(); ctx.arc(sxs > W + 40 ? sxs - W * 2 : sxs, p.y, p.r, 0, TAU); ctx.fill();
  }
  // foundry embers
  if (li === 3) {
    if (dt > 0 && Math.random() < dt * 9) bg.embers.push({ x: rnd(0, W), y: H + 6, vy: -rnd(34, 88), vx: rnd(-14, 14), life: rnd(1.2, 2.6), ph: rnd(0, TAU) });
    for (let i = bg.embers.length - 1; i >= 0; i--) {
      const p = bg.embers[i];
      if (dt > 0) { p.life -= dt; p.x += (p.vx - 40 * scrollMul) * dt; p.y += p.vy * dt; }
      if (p.life <= 0) { bg.embers.splice(i, 1); continue; }
      ctx.fillStyle = pick(['#ff8d3a', '#ffd24a']); ctx.globalAlpha = clamp(p.life * 0.7, 0, 0.9);
      ctx.fillRect(p.x + Math.sin(now / 200 + p.ph) * 4, p.y, 2.5, 2.5);
    }
    ctx.globalAlpha = 1;
  }
  // fireflies + shooting stars (Fuji ascent)
  if (bg.flies) {
    for (const f of bg.flies) {
      const fx = ((f.x - bg.off[2] * 0.5) % W + W) % W;
      ctx.fillStyle = '#cfff8a'; ctx.globalAlpha = 0.25 + 0.6 * Math.abs(Math.sin(now / 600 + f.ph));
      ctx.beginPath(); ctx.arc(fx, f.y + Math.sin(now / 800 + f.ph) * 9, 2, 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (dt > 0) {
      bg.shoot -= dt;
      if (bg.shoot <= 0) { bg.shootA = { x: rnd(W * 0.2, W * 0.9), y: rnd(20, 120), t: 0 }; bg.shoot = rnd(5, 11); }
      if (bg.shootA) {
        bg.shootA.t += dt;
        const sa = bg.shootA, pgr = sa.t / 0.5;
        if (pgr > 1) bg.shootA = null;
        else {
          ctx.strokeStyle = 'rgba(255,255,255,' + (0.8 - pgr * 0.8) + ')'; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(sa.x - pgr * 130, sa.y + pgr * 56);
          ctx.lineTo(sa.x - pgr * 130 + 34, sa.y + pgr * 56 - 15); ctx.stroke();
        }
      }
    }
  }
  // ground strip per theme
  if (li === 2) { // expressway: road + rushing lane dashes
    ctx.fillStyle = '#3c465e'; ctx.fillRect(0, H - 22, W, 22);
    ctx.fillStyle = '#fff';
    const dOff = (bg.off[2] * 3.2) % 64;
    for (let lx = -dOff; lx < W; lx += 64) ctx.fillRect(lx, H - 13, 30, 4);
    ctx.fillStyle = '#ffd24a'; ctx.fillRect(0, H - 22, W, 2);
  } else if (li === 3) { // foundry: glowing seams
    ctx.fillStyle = '#1c0d0a'; ctx.fillRect(0, H - 14, W, 14);
    ctx.fillStyle = '#ff8d3a';
    const sOff = (bg.off[2] * 1.5) % 90;
    for (let lx = -sOff; lx < W; lx += 90) { ctx.globalAlpha = 0.4 + 0.3 * Math.sin(now / 150 + lx); ctx.fillRect(lx, H - 8, 40, 3); }
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, H - 14, W, 14);
  }
  // shinjuku street traffic — moving headlight/taillight pairs
  if (bg.cars) {
    for (const cr of bg.cars) {
      if (dt > 0) { cr.x += cr.v * cr.dir * dt - 30 * scrollMul * dt; if (cr.x < -30) cr.x = W + 20; if (cr.x > W + 30) cr.x = -20; }
      ctx.fillStyle = cr.dir > 0 ? '#ff5d5d' : '#ffe9a3';
      ctx.fillRect(cr.x, H - 9, 3, 3); ctx.fillRect(cr.x + 6, H - 9, 3, 3);
    }
  }
}

/* ---------- particles ---------- */
function burst(x, y, col, n, spd) {
  for (let i = 0; i < (n || 12); i++) {
    const a = rnd(0, TAU), s = rnd(30, spd || 220);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rnd(0.3, 0.7), col, r: rnd(1.5, 4) });
  }
}
function floater(x, y, txt, col) { floaters.push({ x, y, txt, col, life: 0.9 }); }
function ring(x, y, col, vr) { parts.push({ x, y, vx: 0, vy: 0, life: 0.4, col, r: 6, vr: vr || 320, kind: 'ring' }); }
function flashFx(x, y, r, col) { parts.push({ x, y, vx: 0, vy: 0, life: 0.18, col: col || '#fff', r, kind: 'flash' }); }
function shake(amt, t) { shakeAmt = amt; shakeT = t; }

/* ============================================================
   GAMEPLAY UPDATE
   ============================================================ */
function updatePlayer(dt) {
  const p = player;
  let dx = 0, dy = 0;
  if (keys.ArrowLeft || keys.KeyA) dx -= 1;
  if (keys.ArrowRight || keys.KeyD) dx += 1;
  if (keys.ArrowUp || keys.KeyW) dy -= 1;
  if (keys.ArrowDown || keys.KeyS) dy += 1;
  if (dx || dy) { const l = Math.hypot(dx, dy); p.x += dx / l * p.speed * dt; p.y += dy / l * p.speed * dt; }
  if (ptr.down) {
    const fx = (ptr.x - ptr.lx) * 1.5, fy = (ptr.y - ptr.ly) * 1.5;
    p.x += fx; p.y += fy; dy = fy;
    ptr.lx = ptr.x; ptr.ly = ptr.y;
  }
  p.tilt += ((dy < 0 ? -0.3 : dy > 0 ? 0.3 : 0) - p.tilt) * 8 * dt;
  p.x = clamp(p.x, 24, W - 24);
  p.y = clamp(p.y, 24, H - 24);
  p.inv = Math.max(0, p.inv - dt);
  if (p.defl && p.defl.cd > 0) {
    p.defl.cd -= dt;
    if (p.defl.cd <= 0) { p.defl.cd = 0; p.defl.hits = 10; floater(p.x, p.y - 30, 'DEFLECTOR READY', '#9ffcf0'); sfx.pow(); }
  }
  if (Math.random() < dt * 30)
    parts.push({ x: p.x - 18, y: p.y + rnd(-3, 3), vx: -130, vy: rnd(-16, 16), life: 0.28, col: pick(['#37c4ff', '#fff79a']), r: 2.5 });
  fireWeapons(p, dt);
}

function damagePlayer(n) {
  const p = player;
  if (p.inv > 0) return;
  if (p.shield > 0) { p.shield--; p.inv = 0.8; sfx.ehit(); burst(p.x, p.y, '#6ae4ff', 10, 160); return; }
  p.hp -= n; p.inv = 1.6;
  sfx.hurt(); shake(7, 0.3); burst(p.x, p.y, '#ff6a8a', 16, 240);
  if (p.hp > 0 && p.hp <= 2 && !lowHpSaid) { lowHpSaid = true; vox('Critical damage!'); }
  updateHud();
  if (p.hp <= 0) gameOver();
}

function updateBullets(dt) {
  for (let i = pB.length - 1; i >= 0; i--) {
    const b = pB[i];
    if (b.kind === 'missile') {
      let tgt = boss && !boss.entering ? boss : null;
      if (!tgt) { let bd = 1e9; for (const e of enemies) { const d = (e.x - b.x) ** 2 + (e.y - b.y) ** 2; if (e.x > b.x && d < bd) { bd = d; tgt = e; } } }
      if (tgt) {
        const a = Math.atan2(tgt.y - b.y, tgt.x - b.x), cur = Math.atan2(b.vy, b.vx);
        let da = a - cur; while (da > Math.PI) da -= TAU; while (da < -Math.PI) da += TAU;
        const na = cur + clamp(da, -b.turn * dt, b.turn * dt);
        const sp = Math.min(560, Math.hypot(b.vx, b.vy) + 500 * dt);
        b.vx = Math.cos(na) * sp; b.vy = Math.sin(na) * sp;
      }
      parts.push({ x: b.x - 6, y: b.y, vx: -60, vy: rnd(-20, 20), life: 0.25, col: '#ffb38a', r: 2 });
    }
    if (b.kind === 'wave') { b.t += dt; b.y = b.oy + Math.sin(b.t * 9 + b.ph) * 46; }
    if (b.kind === 'bomb') {
      b.vy += b.g * dt; b.fuse -= dt;
      if (b.fuse <= 0) { explodeBomb(b); pB.splice(i, 1); continue; }
    }
    if (b.kind === 'flame') b.r += 16 * dt;
    if (b.life != null) { b.life -= dt; if (b.life <= 0) { pB.splice(i, 1); continue; } }
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.x > W + 60 || b.x < -60 || b.y < -40 || b.y > H + 40) pB.splice(i, 1);
  }
  for (let i = eB.length - 1; i >= 0; i--) {
    const b = eB[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.x < -20 || b.x > W + 30 || b.y < -20 || b.y > H + 20) { eB.splice(i, 1); continue; }
    const D = player.defl;
    if (D && D.hits > 0 && b.vx < 0 && b.x > player.x &&
        hit(b, { x: player.x + 8, y: player.y, r: player.r + 16 })) {
      pB.push({ x: b.x, y: b.y, vx: Math.abs(b.vx) * 1.3 + 220, vy: -b.vy * 0.4, r: 4, dmg: 1, col: '#9ffcf0', kind: 'shot' });
      eB.splice(i, 1);
      D.hits--;
      parts.push({ x: b.x, y: b.y, vx: 80, vy: 0, life: 0.12, col: '#9ffcf0', r: 4 });
      sfx.ehit();
      if (D.hits <= 0) { D.cd = 20; floater(player.x, player.y - 30, 'DEFLECTOR DOWN', '#ff5d76'); sfx.bad(); }
      continue;
    }
    if (hit(b, { x: player.x, y: player.y, r: player.r * 0.62 })) { eB.splice(i, 1); damagePlayer(1); }
  }
}

function damageEnemy(e, dmg, list, idx) {
  e.hp -= dmg; e.flash = 0.08;
  sfx.ehit();
  parts.push({ x: e.x + rnd(-5, 5), y: e.y + rnd(-5, 5), vx: rnd(60, 170), vy: rnd(-70, 70), life: 0.14, col: '#fff', r: 3 });
  if (e.hp <= 0) {
    score += e.pts; streak >= 0 && updateHud();
    burst(e.x, e.y, e.col, 16, 240);
    ring(e.x, e.y, e.col, 300);
    flashFx(e.x, e.y, e.r * 1.7);
    shake(3, 0.1);
    floater(e.x, e.y, '+' + e.pts, '#ffd24a');
    sfx.boom();
    list.splice(idx, 1);
  }
}

function collide() {
  for (let i = pB.length - 1; i >= 0; i--) {
    const b = pB[i];
    let consumed = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (hit(b, e)) {
        damageEnemy(e, b.dmg, enemies, j);
        if (!b.pierce) { pB.splice(i, 1); consumed = true; break; }
      }
    }
    if (consumed) continue;
    if (boss && !boss.entering && hit(b, boss)) {
      boss.hp -= b.dmg; boss.flash = 0.06;
      burst(b.x, b.y, boss.def.col2, 4, 120);
      if (!b.pierce) pB.splice(i, 1);
      if (boss.hp <= 0) bossDown();
    }
  }
  for (let j = enemies.length - 1; j >= 0; j--) {
    const e = enemies[j];
    if (hit(e, { x: player.x, y: player.y, r: player.r * 0.7 })) {
      damageEnemy(e, 3, enemies, j);
      damagePlayer(1);
    }
  }
  if (boss && !boss.entering && hit(boss, { x: player.x, y: player.y, r: player.r * 0.7 })) damagePlayer(1);
}

function bossDown() {
  score += 2000 + levelIdx * 1000;
  floater(boss.x, boss.y, '+' + (2000 + levelIdx * 1000), '#ffd24a');
  for (let i = 0; i < 6; i++) setTimeout(() => { if (boss) burst(boss.x + rnd(-50, 50), boss.y + rnd(-40, 40), pick([boss.def.col, boss.def.col2, '#fff']), 18, 280); }, i * 130);
  sfx.big(); shake(12, 0.7);
  vox('Great success!', true);
  flashT = 0.45;
  const bx = boss.x, by = boss.y;
  ring(bx, by, '#ffffff', 460); ring(bx, by, boss.def.col, 300); flashFx(bx, by, 90);
  setTimeout(() => { burst(bx, by, '#ffffff', 40, 380); }, 800);
  boss = null;
  eB.length = 0;
  setTimeout(levelClear, 1100);
}

function updatePlay(dt) {
  levelTime += dt;
  updatePlayer(dt);
  updateBullets(dt);
  updateEnemies(dt);
  if (boss) updateBoss(boss, dt);
  if (state === 'boss' && Math.random() < dt * 8)
    parts.push({ kind: 'line', x: W + 20, y: rnd(10, H - 10), vx: -1500, vy: 0, life: 0.5, col: 'rgba(255,255,255,0.3)', len: rnd(60, 160), r: 0 });
  collide();
  // particles & floaters
  for (let i = parts.length - 1; i >= 0; i--) { const p = parts[i]; p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; if (p.vr) p.r += p.vr * dt; if (p.life <= 0) parts.splice(i, 1); }
  for (let i = floaters.length - 1; i >= 0; i--) { const f = floaters[i]; f.life -= dt; f.y -= 40 * dt; if (f.life <= 0) floaters.splice(i, 1); }

  if (state === 'play') {
    // spawner
    spawnT -= dt;
    if (spawnT <= 0) { spawnWave(); spawnT = Math.max(0.45, 1.5 - levelIdx * 0.18 - levelTime * 0.005); }
    // mid-level quizzes
    quizT -= dt;
    const levelDur = 70 + levelIdx * 10;
    if (levelTime >= levelDur) {
      enemies.length = 0; eB.length = 0;
      preT = 0;
      setState('prealert');
      sfx.warn(); setTimeout(sfx.warn, 450); setTimeout(sfx.warn, 900);
      vox('Warning!', true);
    } else if (quizT <= 0) {
      openQuiz(false);
      quizT = rnd(11, 18);
    }
  }
}

/* ---------- sprite helpers: bold fills + crisp dark outlines ---------- */
const OUTLINE = '#140a22';
function pathPoly(pts) { ctx.beginPath(); ctx.moveTo(pts[0], pts[1]); for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i + 1]); ctx.closePath(); }
function fillO(col, lw) { ctx.fillStyle = col; ctx.fill(); ctx.lineWidth = lw || 2; ctx.strokeStyle = OUTLINE; ctx.lineJoin = 'round'; ctx.stroke(); }
function eye(x, y, r, px, py, blink, irisCol) {
  if (blink) { ctx.strokeStyle = OUTLINE; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x - r, y); ctx.lineTo(x + r, y); ctx.stroke(); return; }
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); fillO('#fff', 1.5);
  ctx.fillStyle = irisCol || '#1a1230';
  ctx.beginPath(); ctx.arc(x + (px || 0) * r * 0.38, y + (py || 0) * r * 0.38, r * 0.52, 0, TAU); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x + (px || 0) * r * 0.38 - r * 0.18, y + (py || 0) * r * 0.38 - r * 0.18, r * 0.16, 0, TAU); ctx.fill();
}
function tentacle(bx, by, ang, len, segs, t, ph, col, w) {
  let x = bx, y = by, a = ang;
  for (let i = 0; i < segs; i++) {
    const rr = Math.max(2, w * (1 - i / segs));
    a += Math.sin(t * 2.8 + ph + i * 0.85) * 0.42;
    x += Math.cos(a) * (len / segs); y += Math.sin(a) * (len / segs);
    ctx.beginPath(); ctx.arc(x, y, rr, 0, TAU); fillO(col, 1.5);
  }
}

function drawShip(x, y, r, tilt, mini, inv, pi) {

  const s = (r / 13) * 1.18; ctx.scale(s, s);
  if (inv > 0 && Math.floor(inv * 14) % 2) ctx.globalAlpha = 0.35;
  const tnow = performance.now();
  // twin vernier thrusters
  const fl = 11 + Math.sin(tnow / 24) * 5;
  for (const ty of [-5.5, 5.5]) {
    pathPoly([-18, ty - 2.5, -18 - fl, ty - 0.8, -18 - fl * 1.3, ty, -18 - fl, ty + 0.8, -18, ty + 2.5]);
    ctx.fillStyle = '#37c4ff'; ctx.fill();
    pathPoly([-18, ty - 1.2, -18 - fl * 0.5, ty, -18, ty + 1.2]); ctx.fillStyle = '#eafcff'; ctx.fill();
  }
  // wing binders — angular shield wings, white with red tips
  pathPoly([-1, 4, -10, 17, 2, 17, 9, 7]); fillO(C.hull);
  pathPoly([-10, 17, 2, 17, -1, 13.5]); ctx.fillStyle = C.accent; ctx.fill();
  pathPoly([-1, -4, -10, -17, 2, -17, 9, -7]); fillO(C.hull);
  pathPoly([-10, -17, 2, -17, -1, -13.5]); ctx.fillStyle = C.accentHi; ctx.fill();
  // tail stabilizers (yellow)

  pathPoly([-13, 3, -22, 10, -15, 10, -10, 3.5]); fillO(C.trim);
  // twin boom hull

  pathPoly([-18, 8, -4, 8.5, -2, 4, -18, 3.5]); fillO(C.hull2, 1.5);
  // main fuselage — angular mecha torso to nose

  pathPoly([24, 0, 14, 3.5, 5, 6.5, -6, 5.5, -6, 2.5, 20, 1]); ctx.fillStyle = C.hull2; ctx.fill();
  // chest intake (gundam blue) + yellow vents

  ctx.fillStyle = C.trim; ctx.fillRect(-2.5, -2.8, 5, 1.7); ctx.fillRect(-2.5, 1.1, 5, 1.7);
  // head unit behind canopy: green visor + V-fin antenna

  // V-fin

  ctx.fillStyle = C.accent; ctx.fillRect(8.1, -5.6, 1.8, 1.8);
  // nose sensor

  // red shoulder chevrons

function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  const r = e.r, t = e.t;
  const blink = Math.sin(t * 1.9 + (e.ph || 0)) > 0.95;
  const aimA = player ? Math.atan2(player.y - e.y, player.x - e.x) : Math.PI;
  const C = c => e.flash > 0 ? '#ffffff' : c;
  switch (e.type) {
    case 'drone': { // SAUCER SCOUT — little green pilot under glass
      // glass dome behind alien
      ctx.beginPath(); ctx.arc(0, -r * 0.18, r * 0.74, Math.PI, 0); ctx.closePath(); fillO(C('#aef0ff'), 1.5);
      // alien pilot
      ctx.beginPath(); ctx.arc(0, -r * 0.34, r * 0.36, 0, TAU); fillO(C('#5ad66a'), 1.5);
      eye(-r * 0.15, -r * 0.4, r * 0.13, Math.cos(aimA), Math.sin(aimA), blink, '#143a20');
      eye(r * 0.15, -r * 0.4, r * 0.13, Math.cos(aimA), Math.sin(aimA), blink, '#143a20');
      // saucer body
      ctx.beginPath(); ctx.ellipse(0, r * 0.18, r * 1.3, r * 0.52, 0, 0, TAU); fillO(C('#b04ddd'));
      ctx.beginPath(); ctx.ellipse(0, r * 0.02, r * 1.0, r * 0.26, 0, 0, TAU);
      ctx.fillStyle = C('#dcb8f5'); ctx.fill();
      // chasing running lights
      for (let i = -1; i <= 1; i++) {
        ctx.fillStyle = (Math.floor(t * 7) % 3 === i + 1) ? '#fff36a' : '#6a2a92';
        ctx.beginPath(); ctx.arc(i * r * 0.72, r * 0.34, r * 0.15, 0, TAU); ctx.fill();
      }
      break;
    }
    case 'sine': { // JELLY FLOATER — pulsing bell, waving tentacles, one big eye
      const pulse = 1 + Math.sin(t * 5) * 0.1;
      ctx.lineCap = 'round'; ctx.lineWidth = 3.5; ctx.strokeStyle = C('#2f9c52');
      for (let k = 0; k < 4; k++) {
        const bx = (k - 1.5) * r * 0.42;
        ctx.beginPath(); ctx.moveTo(bx, r * 0.4);
        for (let s2 = 1; s2 <= 3; s2++)
          ctx.lineTo(bx + Math.sin(t * 6 + k * 1.3 + s2) * r * 0.26, r * 0.4 + s2 * r * 0.34);
        ctx.stroke();
      }
      ctx.beginPath(); ctx.ellipse(0, 0, r * 1.05 * pulse, r * 0.92 * pulse, 0, 0, TAU); fillO(C('#67e07a'));
      ctx.beginPath(); ctx.ellipse(-r * 0.3, -r * 0.35, r * 0.34, r * 0.2, -0.5, 0, TAU);
      ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fill();
      eye(0, 0, r * 0.42, Math.cos(aimA), Math.sin(aimA), blink, '#0f3a1c');
      break;
    }
    case 'zig': { // SPINNER MINE — whirling blades around an angry eye
      ctx.save(); ctx.rotate(t * 4.2);
      for (let i = 0; i < 4; i++) {
        pathPoly([r * 0.3, 0, r * 1.25, -r * 0.34, r * 1.5, 0, r * 1.25, r * 0.16]); fillO(C('#ffc73a'));
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; pathPoly([r * 0.55, -r * 0.1, r * 1.3, -r * 0.28, r * 1.34, -r * 0.16]); ctx.fill();
        ctx.rotate(TAU / 4);
      }
      ctx.restore();
      ctx.beginPath(); ctx.arc(0, 0, r * 0.6, 0, TAU); fillO(C('#e2762a'));
      ctx.fillStyle = '#3a0d18'; ctx.beginPath(); ctx.arc(0, 0, r * 0.36, 0, TAU); ctx.fill();
      ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.arc(0, 0, r * (0.18 + 0.05 * Math.sin(t * 9)), 0, TAU); ctx.fill();
      break;
    }
    case 'shooter': { // GUNNER POD — tracking cannon, glowing cockpit
      // barrel (under hull) aims at player
      ctx.save(); ctx.rotate(aimA);
      ctx.beginPath(); ctx.rect(0, -3.5, r * 1.3, 7); fillO(C('#36537a'), 1.5);
      if (e.fireT < 0.4) { // charge glow
        ctx.fillStyle = '#fff36a'; ctx.globalAlpha = 0.6 + 0.4 * Math.sin(t * 30);
        ctx.beginPath(); ctx.arc(r * 1.3, 0, 5 + Math.sin(t * 30) * 2, 0, TAU); ctx.fill(); ctx.globalAlpha = 1;
      }
      ctx.restore();
      pathPoly([-r, -r * 0.9, r * 0.5, -r * 0.55, r * 0.85, 0, r * 0.5, r * 0.55, -r, r * 0.9]); fillO(C('#3ea7e8'));
      pathPoly([-r, -r * 0.9, -r * 0.4, -r * 0.62, -r * 0.4, r * 0.62, -r, r * 0.9]);
      ctx.fillStyle = C('#2a6fa8'); ctx.fill();
      // cockpit slit
      ctx.fillStyle = '#9ffcf0'; ctx.fillRect(-r * 0.1, -r * 0.16, r * 0.55, r * 0.32);
      ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1.5; ctx.strokeRect(-r * 0.1, -r * 0.16, r * 0.55, r * 0.32);
      // rivets
      ctx.fillStyle = '#1d3a55';
      for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.arc(-r * 0.68, i * r * 0.42, 1.6, 0, TAU); ctx.fill(); }
      break;
    }
    case 'diver': { // TALON RAPTOR — flapping winged beast, angry brow
      const flap = Math.sin(t * 11);
      ctx.rotate(clamp((player ? player.y - e.y : 0) * 0.003, -0.45, 0.45));
      pathPoly([0, -r * 0.2, -r * 0.8, -r * (1.25 + flap * 0.5), -r * 1.35, -r * (0.7 + flap * 0.4), -r * 0.35, 0]); fillO(C('#b545e8'));
      pathPoly([0, r * 0.2, -r * 0.8, r * (1.25 - flap * 0.5), -r * 1.35, r * (0.7 - flap * 0.4), -r * 0.35, 0]); fillO(C('#9a35cc'));
      pathPoly([r * 1.1, 0, -r * 0.15, -r * 0.6, -r * 1.05, -r * 0.28, -r * 1.3, 0, -r * 1.05, r * 0.28, -r * 0.15, r * 0.6]); fillO(C('#e070ff'));
      // beak
      pathPoly([r * 1.5, 0, r * 0.7, -r * 0.3, r * 0.7, r * 0.3]); fillO('#ffd24a', 1.5);
      // angry eye + brow
      eye(r * 0.3, -r * 0.14, r * 0.22, 1, 0, blink, '#5a0d18');
      ctx.strokeStyle = OUTLINE; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(r * 0.05, -r * 0.46); ctx.lineTo(r * 0.55, -r * 0.22); ctx.stroke();
      // tail spikes
      pathPoly([-r * 1.3, 0, -r * 1.7, -r * 0.22, -r * 1.45, 0, -r * 1.7, r * 0.22]); fillO(C('#e070ff'), 1.5);
      break;
    }
    case 'pop': { // SPAWNLING — squishy chomper
      const sq = Math.sin(t * 9) * 0.14;
      ctx.scale(1 + sq, 1 - sq);
      ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU); fillO(C('#ff8d5c'));
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.35, r * 0.26, 0, TAU); ctx.fill();
      // chomping mouth (faces left)
      const ch = (Math.sin(t * 7) + 1) / 2;
      ctx.beginPath(); ctx.ellipse(-r * 0.45, r * 0.05, r * 0.3, r * 0.18 + r * 0.3 * ch, 0, 0, TAU); fillO('#5a1808', 1.5);
      ctx.fillStyle = '#fff'; ctx.fillRect(-r * 0.62, r * 0.05 - (r * 0.18 + r * 0.3 * ch), 4, 3.5);
      eye(-r * 0.05, -r * 0.35, r * 0.18, -1, 0.2, blink);
      eye(r * 0.42, -r * 0.2, r * 0.18, -1, 0.2, blink);
      break;
    }
    case 'tank': { // DREADNOUGHT HAULER — armored, riveted, turreted
      pathPoly([-r, -r * 0.55, r * 0.85, -r * 0.55, r * 1.08, -r * 0.15, r * 1.08, r * 0.15, r * 0.85, r * 0.55, -r, r * 0.55]); fillO(C('#8e9cc0'));
      ctx.fillStyle = C('#b9c4e0'); ctx.fillRect(-r, -r * 0.55, r * 1.85, r * 0.26);
      // hazard stripe band
      for (let hx = -r + 4; hx < r * 0.8; hx += 12) {
        ctx.fillStyle = ((hx / 12) | 0) % 2 ? '#ffd24a' : '#241a30';
        pathPoly([hx, r * 0.28, hx + 8, r * 0.28, hx + 4, r * 0.52, hx - 4, r * 0.52]); ctx.fill();
      }
      // rivets
      ctx.fillStyle = '#4a5878';
      for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.arc(-r * 0.8 + i * r * 0.42, -r * 0.42, 1.8, 0, TAU); ctx.fill(); }
      // turret tracking player
      ctx.save(); ctx.translate(r * 0.1, -r * 0.2); ctx.rotate(clamp(aimA, Math.PI * 0.6, Math.PI * 1.4));
      ctx.beginPath(); ctx.rect(0, -3, r * 0.9, 6); fillO(C('#5b6a8f'), 1.5);
      ctx.restore();
      ctx.beginPath(); ctx.arc(r * 0.1, -r * 0.2, r * 0.3, 0, TAU); fillO(C('#5b6a8f'), 1.5);
      // engine flare
      const ef = 6 + Math.sin(t * 22) * 3;
      pathPoly([r * 1.08, -r * 0.12, r * 1.08 + ef, 0, r * 1.08, r * 0.12]);
      ctx.fillStyle = '#ff8d3a'; ctx.fill();
      // warning light
      ctx.fillStyle = Math.floor(t * 4) % 2 ? '#ff4d4d' : '#5a1020';
      ctx.beginPath(); ctx.arc(-r * 0.55, 0, 3, 0, TAU); ctx.fill();
      break;
    }
  }
  ctx.restore();
}

/* ---------- pilot portraits (Street Fighter select style) ---------- */
function portraitDataURL(i) {
  const P = PILOTS[i], C = P.cols, S = 120;
  const c = document.createElement('canvas'); c.width = S; c.height = S;
  const g = c.getContext('2d');
  const O = '#140a22';
  function pp(pts, col, lw) {
    g.beginPath(); g.moveTo(pts[0], pts[1]);
    for (let k = 2; k < pts.length; k += 2) g.lineTo(pts[k], pts[k + 1]);
    g.closePath(); g.fillStyle = col; g.fill();
    g.lineWidth = lw || 2.4; g.strokeStyle = O; g.lineJoin = 'round'; g.stroke();
  }
  // dramatic two-tone backdrop with diagonal slash
  g.fillStyle = C.hull2; g.fillRect(0, 0, S, S);
  g.fillStyle = C.accent; g.globalAlpha = 0.85;
  g.beginPath(); g.moveTo(0, S); g.lineTo(S, 14); g.lineTo(S, S); g.closePath(); g.fill();
  g.globalAlpha = 0.14; g.fillStyle = '#fff';
  for (let yy = 6; yy < S; yy += 12) g.fillRect(0, yy, S, 3);
  g.globalAlpha = 1;
  const chb = P.chibi;
  const cy = chb ? 66 : 58;                      // head center
  const hr = chb ? 33 : 27;                      // head radius
  // shoulders / flight suit
  pp(chb ? [28, 120, 36, 96, 60, 88, 84, 96, 92, 120] : [16, 120, 26, 88, 60, 78, 94, 88, 104, 120], C.accent);
  g.fillStyle = C.trim; g.fillRect(chb ? 44 : 38, chb ? 98 : 92, chb ? 32 : 44, 5);
  // neck
  pp([52, cy + hr - 6, 52, cy + hr + 10, 68, cy + hr + 10, 68, cy + hr - 6], P.skin, 2);
  // face
  g.beginPath(); g.arc(60, cy, hr, 0, TAU); g.fillStyle = P.skin; g.fill();
  g.lineWidth = 2.4; g.strokeStyle = O; g.stroke();
  // face shading (right side)
  g.globalAlpha = 0.16; g.fillStyle = '#5a2a30';
  g.beginPath(); g.arc(60, cy, hr, -0.5, 1.2); g.lineTo(60, cy); g.closePath(); g.fill();
  g.globalAlpha = 1;
  // hair bangs under helmet rim
  g.fillStyle = P.hair;
  if (i === 0) { // Jackson — blonde spikes
    pp([36, cy - 12, 42, cy - 22, 48, cy - 12, 55, cy - 23, 62, cy - 12, 70, cy - 23, 78, cy - 12, 84, cy - 18, 84, cy - 8, 36, cy - 8], P.hair, 2);
  } else if (chb) { // Ollie — round bangs
    pp([34, cy - 10, 44, cy - 18, 56, cy - 11, 68, cy - 18, 80, cy - 11, 86, cy - 14, 86, cy - 5, 34, cy - 5], P.hair, 2);
  } else {
    pp([36, cy - 11, 46, cy - 19, 60, cy - 12, 74, cy - 19, 84, cy - 11, 84, cy - 6, 36, cy - 6], P.hair, 2);
  }
  // helmet shell + raised visor
  pp([26, cy - 8, 28, cy - 34, 60, cy - 46, 92, cy - 34, 94, cy - 8, 84, cy - 14, 60, cy - 20, 36, cy - 14], C.hull, 2.6);
  g.fillStyle = C.accent; g.fillRect(54, cy - 46, 12, 14);            // crest stripe
  pp([32, cy - 30, 60, cy - 40, 88, cy - 30, 86, cy - 22, 60, cy - 31, 34, cy - 22], '#1a2236', 2); // raised visor band
  g.fillStyle = 'rgba(160,220,255,0.55)'; g.fillRect(40, cy - 31, 18, 4); // visor shine
  // ear pods + chin strap
  g.beginPath(); g.arc(30, cy + 2, 8, 0, TAU); g.fillStyle = C.hull; g.fill(); g.stroke();
  g.beginPath(); g.arc(90, cy + 2, 8, 0, TAU); g.fillStyle = C.hull; g.fill(); g.stroke();
  g.strokeStyle = O; g.lineWidth = 2.2;
  g.beginPath(); g.moveTo(34, cy + 8); g.lineTo(48, cy + hr - 2); g.moveTo(86, cy + 8); g.lineTo(72, cy + hr - 2); g.stroke();
  // eyes
  const ew = chb ? 8.5 : 6, eh = chb ? 9.5 : 6.5, ey = cy + (chb ? 2 : 0);
  for (const ex of [46, 74]) {
    g.beginPath(); g.ellipse(ex, ey, ew, eh, 0, 0, TAU); g.fillStyle = '#fff'; g.fill();
    g.lineWidth = 2; g.strokeStyle = O; g.stroke();
    g.fillStyle = P.iris; g.beginPath(); g.arc(ex + 1, ey + 1, chb ? 4.6 : 3.1, 0, TAU); g.fill();
    g.fillStyle = '#fff'; g.beginPath(); g.arc(ex - 1, ey - 1.5, chb ? 2.2 : 1.2, 0, TAU); g.fill();
  }
  // brows: Jackson confident / Arthur stern / Paulo relaxed / Ollie high & round
  g.strokeStyle = i === 0 ? '#c98830' : '#1a1020'; g.lineWidth = 3;
  g.beginPath();
  if (i === 1) { g.moveTo(38, ey - 12); g.lineTo(52, ey - 8); g.moveTo(82, ey - 12); g.lineTo(68, ey - 8); }
  else if (i === 3) { g.moveTo(39, ey - 14); g.quadraticCurveTo(46, ey - 18, 53, ey - 14); g.moveTo(67, ey - 14); g.quadraticCurveTo(74, ey - 18, 81, ey - 14); }
  else { g.moveTo(39, ey - 10); g.lineTo(53, ey - 12); g.moveTo(81, ey - 10); g.lineTo(67, ey - 12); }
  g.stroke();
  // nose + mouth
  g.strokeStyle = O; g.lineWidth = 2;
  g.beginPath(); g.moveTo(60, ey + 4); g.lineTo(58, ey + (chb ? 8 : 11)); g.stroke();
  if (chb) { // big open grin + blush
    g.beginPath(); g.arc(60, ey + 15, 8, 0.1, Math.PI - 0.1); g.fillStyle = '#7a2430'; g.fill(); g.stroke();
    g.fillStyle = '#fff'; g.fillRect(53, ey + 14, 14, 3);
    g.fillStyle = 'rgba(255,110,120,0.5)';
    g.beginPath(); g.arc(38, ey + 9, 4.5, 0, TAU); g.arc(82, ey + 9, 4.5, 0, TAU); g.fill();
  } else if (i === 2) { // Paulo: easy grin + goatee + mustache
    g.beginPath(); g.moveTo(50, ey + 16); g.quadraticCurveTo(60, ey + 21, 70, ey + 15); g.stroke();
    g.fillStyle = P.hair;
    g.fillRect(50, ey + 11, 20, 3.2);
    pp([54, ey + 21, 66, ey + 21, 60, ey + 28], P.hair, 1.6);
  } else if (i === 1) { // Arthur: firm line
    g.beginPath(); g.moveTo(51, ey + 16); g.lineTo(69, ey + 16); g.stroke();
  } else { // Jackson: smirk
    g.beginPath(); g.moveTo(50, ey + 15); g.quadraticCurveTo(62, ey + 19, 71, ey + 13); g.stroke();
  }
  try { return c.toDataURL(); } catch (e) { return ''; }
}

/* ---------- bosses: big silhouettes, animated attack features ---------- */

  const s = b.def.style, t = b.t, ph2 = b.hp < b.maxHp * 0.5;

    ctx.fillStyle = CC('#bdf7d2'); ctx.fill();

    ctx.beginPath(); ctx.moveTo(-90, 8); ctx.lineTo(-46, 8); ctx.lineTo(-46, 8 + jaw); ctx.lineTo(-82, 8 + jaw * 0.8); ctx.closePath(); fillO('#0d2a1a', 1.5);
    ctx.fillStyle = '#9ffcf0'; ctx.globalAlpha = 0.5 + 0.3 * Math.sin(t * 6);

    for (let i = 0; i < 4; i++) pathPoly([-86 + i * 11, 8, -82 + i * 11, 8, -84 + i * 11, 15]), ctx.fill();

    eye(-58, -16, 10, -1, 0.3, Math.sin(t * 1.3) > 0.93, ph2 ? '#a01428' : '#0f3a1c');

    pathPoly([30, 34, 56, 58, 66, 52, 50, 28]); fillO(CC('#3a8fc0'));
    pathPoly([-90, 0, -40, 22, 30, 34, 50, 20, -50, 12]);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
    pathPoly([-70, -4, -40, -10, -34, 0, -40, 10, -70, 4]); fillO('#e8f6ff', 1.5);
    ctx.fillStyle = '#16324a'; ctx.fillRect(-52, -4, 8, 5);

  }
  else if (s === 3) { // KŌTETSU FORTRESS — turreted siege platform with smokestack
    pathPoly([-90, 26, 90, 26, 90, 54, -90, 54]); fillO(CC('#7a5a2a'));
    pathPoly([-80, -18, 80, -18, 88, 26, -88, 26]); fillO(CC('#caa23a'));
    pathPoly([-60, -52, 60, -52, 70, -18, -70, -18]); fillO(CC('#e8c050'));
    // smokestack
    ctx.beginPath(); ctx.rect(34, -86, 20, 36); fillO(CC('#7a5a2a'), 2);
    ctx.fillStyle = '#e23a52'; ctx.fillRect(34, -86, 20, 6);

      const sp = (t * 0.7 + i / 3) % 1;

      ctx.beginPath(); ctx.arc(44 + Math.sin(sp * 5) * 8, -90 - sp * 46, 6 + sp * 12, 0, TAU); ctx.fill();
    }
    // rivet grid + hazard stripes
    ctx.fillStyle = '#5a4318';
    for (let rx = -70; rx <= 70; rx += 20) for (const ry of [-44, -6, 36]) { ctx.beginPath(); ctx.arc(rx, ry, 2, 0, TAU); ctx.fill(); }
    for (let hx = -84; hx < 84; hx += 16) {

    for (const [tx, ty] of [[-50, -52], [-76, 4], [-40, 26]]) {

  else { // ŌKAMI PRIME — wolf-head flagship, writhing tentacles, pulsing core
    for (let k = 0; k < 4; k++) tentacle(50, -30 + k * 22, Math.PI, 95, 7, t * anim, k * 1.7, CC('#7a1430'), 8);
    pathPoly([20, -56, 92, -44, 96, 44, 20, 56]); fillO(CC('#8e1838'));
    // wolf head
    pathPoly([-96, 6, -56, -22, -30, -56, -10, -34, 30, -40, 38, 0, 26, 34, -20, 42, -64, 28]); fillO(CC('#c22246'));
    pathPoly([-30, -56, -10, -34, -34, -30]); fillO(CC('#8e1838'), 1.5); // ear
    pathPoly([10, -48, 26, -28, 0, -30]); fillO(CC('#8e1838'), 1.5);    // ear 2
    // jaw, slightly working
    const jaw2 = 6 + (Math.sin(t * 3 * anim) * 0.5 + 0.5) * 10;
    pathPoly([-96, 8, -50, 14, -44, 22 + jaw2, -88, 16 + jaw2]); fillO(CC('#a01a3c'));
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 3; i++) { pathPoly([-88 + i * 14, 10, -80 + i * 14, 10, -84 + i * 14, 19]); ctx.fill(); }
    // glowing eyes

    ctx.fillStyle = ec;
    pathPoly([-58, -14, -36, -20, -38, -8]); ctx.fill();
    pathPoly([-20, -22, 2, -26, -4, -12]); ctx.fill();
    // chest core
    ctx.beginPath(); ctx.arc(10, 6, 17 + Math.sin(t * 5) * 2.5, 0, TAU); fillO('#0c0716');

    ctx.strokeStyle = '#9ffcf0'; ctx.globalAlpha = 0.4; ctx.lineWidth = 2;

  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(W / 2 - 210.5, 16.5, 421, 14);
  ctx.fillStyle = '#fff'; ctx.font = '16px "Press Start 2P", monospace'; ctx.textAlign = 'center';

function coreEye(x, y, b, col, ph2) {
  ctx.beginPath(); ctx.arc(x, y, 14, 0, TAU); fillO('#0c0716');
  ctx.fillStyle = ph2 ? '#ff3a3a' : col;
  ctx.beginPath(); ctx.arc(x, y, 6 + Math.sin(b.t * 5) * 2.5, 0, TAU); ctx.fill();
}

function drawGame(dt) {
  const scrollMul = (state === 'boss' || state === 'bossintro') ? 0.35 : 1;
  const frozen = (state === 'quiz' || state === 'upgrade' || state === 'pause');
  drawBG(frozen ? 0 : dt, scrollMul);
  ctx.save();
  if (shakeT > 0) { shakeT -= dt; ctx.translate(rnd(-shakeAmt, shakeAmt), rnd(-shakeAmt, shakeAmt)); }
  for (const e of enemies) drawEnemy(e);
  if (boss) drawBoss(boss);
  // player bullets
  for (const b of pB) {
    ctx.fillStyle = b.col;
    if (b.kind === 'beam') { ctx.fillRect(b.x - (b.w || 30), b.y - b.r / 2, b.w || 30, b.r); ctx.fillStyle = '#fff'; ctx.fillRect(b.x - (b.w || 30), b.y - 1, b.w || 30, 2); }
    else if (b.kind === 'missile') { ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(Math.atan2(b.vy, b.vx)); ctx.fillRect(-7, -2.5, 14, 5); ctx.fillStyle = '#fff'; ctx.fillRect(4, -1.5, 4, 3); ctx.restore(); }
    else if (b.kind === 'bomb') {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); fillO('#3a4668', 1.5);
      ctx.fillStyle = Math.floor(b.fuse * 9) % 2 ? '#ff5d3a' : '#ffd24a';
      ctx.fillRect(b.x - 1.5, b.y - b.r - 4, 3, 4);
    }
    else if (b.kind === 'flame') {
      ctx.globalAlpha = clamp((b.life || 0.3) * 2.4, 0, 0.9);
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
      ctx.fillStyle = '#fff79a'; ctx.beginPath(); ctx.arc(b.x - 2, b.y, b.r * 0.4, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    }
    else {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x - 1, b.y, b.r * 0.45, 0, TAU); ctx.fill();
    }
  }
  // enemy bullets
  for (const b of eB) {
    ctx.fillStyle = '#ff5e7a'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ffd9e0'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.45, 0, TAU); ctx.fill();
  }
  // drones
  if (player && player.drones) {
    for (let i = 0; i < player.drones; i++) {
      const a = player.droneA + i * TAU / player.drones;
      const dx = player.x + Math.cos(a) * 34, dy = player.y + Math.sin(a) * 34;
      ctx.fillStyle = '#9ffcf0'; ctx.beginPath(); ctx.arc(dx, dy, 6, 0, TAU); ctx.fill();
      ctx.fillStyle = '#0c2a2a'; ctx.beginPath(); ctx.arc(dx + 1.5, dy, 2.5, 0, TAU); ctx.fill();
    }
  }
  if (player) {
    drawShip(player.x, player.y, player.baseR, player.tilt, player.mini, player.inv);
    if (player.shield > 0) {
      ctx.strokeStyle = 'rgba(106,228,255,' + (0.4 + 0.2 * Math.sin(performance.now() / 120)) + ')';
      ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(player.x, player.y, player.baseR + 12, 0, TAU); ctx.stroke();
    }
    if (player.defl && player.defl.hits > 0) {
      ctx.strokeStyle = 'rgba(159,252,240,' + (0.35 + 0.55 * (player.defl.hits / 10)) + ')';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(player.x + 8, player.y, player.baseR + 16, -1.15, 1.15); ctx.stroke();
    }
  }
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.life * 2.2, 0, 1);
    if (p.kind === 'ring') { ctx.lineWidth = 3.5; ctx.strokeStyle = p.col; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.stroke(); }
    else if (p.kind === 'flash') {
      const rr = p.r * (1 + (0.18 - p.life) * 5);
      ctx.fillStyle = p.col;
      pathPoly([p.x - rr, p.y, p.x - rr * 0.22, p.y - rr * 0.22, p.x, p.y - rr, p.x + rr * 0.22, p.y - rr * 0.22, p.x + rr, p.y, p.x + rr * 0.22, p.y + rr * 0.22, p.x, p.y + rr, p.x - rr * 0.22, p.y + rr * 0.22]);
      ctx.fill();
    }
    else if (p.kind === 'line') { ctx.fillStyle = p.col; ctx.fillRect(p.x, p.y, p.len, 2); }
    else { ctx.fillStyle = p.col; ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r); }
  }
  ctx.globalAlpha = 1;
  ctx.font = '16px "Press Start 2P", monospace'; ctx.textAlign = 'center';
  for (const f of floaters) { ctx.globalAlpha = clamp(f.life, 0, 1); ctx.fillStyle = f.col; ctx.fillText(f.txt, f.x, f.y); }
  ctx.globalAlpha = 1;
  ctx.restore();
  drawHpBar();
  if (state === 'prealert') drawPreAlert();
  if (state === 'bossintro') drawBossIntro();
  if (flashT > 0) { flashT -= dt; ctx.globalAlpha = clamp(flashT * 1.7, 0, 0.85); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
}

function drawHpBar() {
  if (!player) return;
  const p = player;
  for (let i = 0; i < p.maxHp; i++) {
    ctx.fillStyle = i < p.hp ? '#ff4d6d' : 'rgba(255,255,255,0.15)';
    ctx.fillRect(14 + i * 16, H - 24, 12, 12);
  }
  for (let i = 0; i < p.shield; i++) {
    ctx.fillStyle = '#6ae4ff';
    ctx.fillRect(14 + i * 12, H - 40, 8, 8);
  }
  // weapon readout
  ctx.font = '16px "Press Start 2P", monospace'; ctx.textAlign = 'right';
  let yy = H - 16;
  for (const id in p.weapons) {
    const w = WEAPONS[id];
    ctx.fillStyle = w.col;
    ctx.fillText(w.name + ((id === 'hyper' || id === 'flame') ? '' : ' LV.' + p.weapons[id]), W - 14, yy);
    yy -= 20;
  }
  if (p.bomb) { ctx.fillStyle = '#ff8d3a'; ctx.fillText('BOMBS LV.' + p.bomb, W - 14, yy); yy -= 20; }
  if (p.defl) {
    ctx.fillStyle = p.defl.cd > 0 ? '#5b6a8f' : '#9ffcf0';
    ctx.fillText(p.defl.cd > 0 ? 'DEFL ' + Math.ceil(p.defl.cd) + 's' : 'DEFL ' + p.defl.hits + '/10', W - 14, yy);
    yy -= 20;
  }
  ctx.textAlign = 'left';
}

function drawPreAlert() {
  const fl = Math.floor(preT * 5) % 2 === 0;
  // hazard-striped banner
  ctx.fillStyle = 'rgba(40,4,12,0.82)'; ctx.fillRect(0, H / 2 - 92, W, 184);
  ctx.save(); ctx.beginPath(); ctx.rect(0, H / 2 - 92, W, 14); ctx.rect(0, H / 2 + 78, W, 14); ctx.clip();
  const sOff = (performance.now() / 14) % 36;
  for (let x = -40 + sOff; x < W + 40; x += 36) {
